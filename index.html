<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATBUY — магазин игр</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0a0c10;
        color: #eef2ff;
      }
      .header {
        background: #0f1117;
        border-bottom: 1px solid #1f2329;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 0 24px;
      }
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
        flex-wrap: wrap;
        gap: 16px;
      }
      .logo a {
        font-size: 1.8rem;
        font-weight: 800;
        text-decoration: none;
        color: #3b82f6;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 28px;
        flex-wrap: wrap;
      }
      .nav-links a {
        text-decoration: none;
        color: #9ca3af;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: #3b82f6;
      }
      .cart-link {
        background: #3b82f6;
        padding: 6px 14px;
        border-radius: 30px;
        color: #fff !important;
      }
      .youtube-link {
        background: #ff0000;
        color: #fff !important;
        padding: 6px 14px;
        border-radius: 30px;
      }
      .auth-btn {
        background: #3b82f6;
        padding: 8px 22px;
        border-radius: 30px;
        color: #fff;
        font-weight: 600;
        text-decoration: none;
      }
      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #9ca3af;
        cursor: pointer;
      }
      .logout-btn {
        background: none;
        border: 1px solid #3b82f6;
        color: #3b82f6;
        padding: 5px 12px;
        border-radius: 20px;
        cursor: pointer;
      }
      .main {
        padding: 48px 0 64px;
      }
      .hero {
        text-align: center;
        margin-bottom: 56px;
      }
      .hero h1 {
        font-size: 3.2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #fff, #3b82f6);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .hero p {
        color: #9ca3af;
      }
      .stats {
        background: #15181f;
        border-radius: 30px;
        padding: 20px;
        margin-bottom: 48px;
        border: 1px solid #2d3138;
      }
      .stats h2 {
        font-size: 1.4rem;
        margin-bottom: 16px;
        color: #3b82f6;
        text-align: center;
      }
      .stats-grid {
        display: flex;
        justify-content: center;
        gap: 40px;
        flex-wrap: wrap;
      }
      .stat-item {
        text-align: center;
      }
      .stat-number {
        font-size: 2rem;
        font-weight: bold;
        color: #fbbf24;
      }
      .stat-label {
        color: #9ca3af;
        margin-top: 4px;
      }
      .search-box {
        max-width: 600px;
        margin: 0 auto 48px;
      }
      .search-box input {
        width: 100%;
        padding: 14px 24px;
        background: #1f2329;
        border: 1px solid #2d3138;
        border-radius: 60px;
        color: #fff;
        outline: 0;
      }
      .games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 24px;
      }
      .game-card {
        background: #15181f;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid #22262e;
        transition: transform 0.2s;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      .game-card:hover {
        transform: translateY(-4px);
        border-color: #3b82f6;
      }
      .card-image {
        width: 100%;
        aspect-ratio: 1/1;
        background: #0f1117;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .card-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .game-title {
        background: #000000b3;
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        padding: 8px;
        text-align: center;
        border-top: 1px solid #2d3138;
      }
      .footer {
        background: #0f1117;
        border-top: 1px solid #1f2329;
        padding: 30px 0;
      }
      .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
      }
      @media (max-width: 768px) {
        .navbar {
          flex-direction: column;
          text-align: center;
        }
        .stats-grid {
          gap: 20px;
        }
        .games-grid {
          grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="navbar">
          <div class="logo"><a href="index.html">ATBUY</a></div>
          <div class="nav-links">
            <a href="reviews.html">Отзывы</a>
            <a href="cart.html" class="cart-link">🛒 Корзина</a>
            <a href="my-orders.html" class="cart-link">📦 Мои заказы</a>
            <a href="support.html" class="cart-link">💬 Поддержка</a>
            <span id="admin-links"></span>
            <a href="https://t.me/your_telegram" target="_blank">Telegram</a>
            <a
              href="https://www.youtube.com/@atr1but"
              target="_blank"
              class="youtube-link"
              >🎬 YouTube</a
            >
            <div id="auth-section"></div>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="container">
        <div class="hero">
          <h1>ИГРЫ</h1>
          <p>Цифровые товары для геймеров</p>
        </div>
        <div class="stats">
          <h2>Нас уже выбрали</h2>
          <div class="stats-grid">
            <div class="stat-item">
              <div class="stat-number">10 000+</div>
              <div class="stat-label">Довольных клиентов</div>
            </div>
            <div class="stat-item">
              <div class="stat-number">50+</div>
              <div class="stat-label">Игр в каталоге</div>
            </div>
            <div class="stat-item">
              <div class="stat-number">24/7</div>
              <div class="stat-label">Поддержка</div>
            </div>
          </div>
        </div>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Поиск игры..." />
        </div>
        <div id="gamesContainer" class="games-grid"></div>
      </div>
    </main>
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div>© 2025 ATBUY. Все права защищены.</div>
          <div>
            <a
              href="reviews.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Отзывы</a
            >
            <a
              href="terms.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Оферта</a
            >
            <a
              href="delivery.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Доставка</a
            >
            <a
              href="requisites.html"
              style="color: #9ca3af; text-decoration: none"
              >Реквизиты</a
            >
          </div>
        </div>
      </div>
    </footer>
    <script>
      let games = [];
      let currentUser = null;
      let isAdmin = false;

      // Простая авторизация из localStorage
      function checkAuth() {
        const stored = localStorage.getItem("atbuy_current_user");
        if (stored) {
          const userData = JSON.parse(stored);
          currentUser = {
            email: userData.email,
            user_metadata: { name: userData.name },
          };
          isAdmin = localStorage.getItem("atbuy_is_admin") === "true";
        }
        renderAuthHeader();
      }

      function renderAuthHeader() {
        const authSection = document.getElementById("auth-section");
        const adminLinks = document.getElementById("admin-links");
        if (currentUser) {
          authSection.innerHTML = `<div class="user-info" id="userMenu"><span>👤 ${escapeHtml(currentUser.user_metadata?.name || currentUser.email)}</span><button id="logoutBtn" class="logout-btn">Выйти</button></div>`;
          document.getElementById("userMenu").addEventListener("click", (e) => {
            if (e.target.id !== "logoutBtn")
              window.location.href = "profile.html";
          });
          document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("atbuy_current_user");
            localStorage.removeItem("atbuy_is_admin");
            // Создаём клиент Supabase только для выхода (можно и без него, но так проще)
            const supabaseClient = window.supabase.createClient(
              "https://buonqsikukvqbnbpuuco.supabase.co",
              "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw",
            );
            supabaseClient.auth
              .signOut()
              .finally(() => window.location.reload());
          });
          if (adminLinks)
            adminLinks.innerHTML = isAdmin
              ? `<a href="admin-chats.html" class="cart-link">📋 Чаты поддержки</a>`
              : "";
        } else {
          authSection.innerHTML = `<a href="login.html" class="auth-btn">Вход / Регистрация</a>`;
          if (adminLinks) adminLinks.innerHTML = "";
        }
      }

      // Загрузка игр из JSON
      async function loadGames() {
        try {
          const response = await fetch("/games.json");
          if (!response.ok) throw new Error("Ошибка загрузки игр");
          games = await response.json();
          renderGames();
        } catch (err) {
          console.error(err);
          document.getElementById("gamesContainer").innerHTML =
            '<div style="grid-column:1/-1; text-align:center; padding:40px;">😔 Ошибка загрузки игр</div>';
        }
      }

      function renderGames(filter = "") {
        const container = document.getElementById("gamesContainer");
        const filtered = games.filter((g) =>
          g.name.toLowerCase().includes(filter.toLowerCase()),
        );
        if (!filtered.length) {
          container.innerHTML =
            '<div style="grid-column:1/-1; text-align:center; padding:40px;">😔 Игры не найдены</div>';
          return;
        }
        container.innerHTML = filtered
          .map((game) => {
            const imageUrl =
              game.image &&
              (game.image.startsWith("http") || game.image.startsWith("/"));
            return `<div class="game-card" data-link="${game.link || "#"}">
                    <div class="card-image">${imageUrl ? `<img src="${game.image}" alt="${escapeHtml(game.name)}" loading="lazy">` : `<div style="font-size:3rem;">🖼️</div>`}</div>
                    <div class="game-title">${escapeHtml(game.name)}</div>
                </div>`;
          })
          .join("");

        document.querySelectorAll(".game-card").forEach((card) => {
          card.addEventListener("click", () => {
            const link = card.dataset.link;
            if (link && link !== "#") window.location.href = link;
            else alert("Страница в разработке");
          });
        });
      }

      function escapeHtml(str) {
        return str.replace(
          /[&<>]/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m],
        );
      }

      // Инициализация
      window.addEventListener("load", () => {
        checkAuth();
        loadGames();
        document
          .getElementById("searchInput")
          .addEventListener("input", (e) =>
            renderGames(e.target.value.toLowerCase()),
          );
      });
    </script>
  </body>
</html>
