<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATBUY — Личный кабинет</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0a0c10;
        color: #eef2ff;
      }
      .header {
        background: #0f1117;
        border-bottom: 1px solid #1f2329;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 0 24px;
      }
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
        flex-wrap: wrap;
        gap: 16px;
      }
      .logo a {
        font-size: 1.8rem;
        font-weight: 800;
        text-decoration: none;
        color: #3b82f6;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 28px;
        flex-wrap: wrap;
      }
      .nav-links a {
        text-decoration: none;
        color: #9ca3af;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: #3b82f6;
      }
      .cart-link {
        background: #3b82f6;
        padding: 6px 14px;
        border-radius: 30px;
        color: #fff !important;
      }
      .youtube-link {
        background: #ff0000;
        color: #fff !important;
        padding: 6px 14px;
        border-radius: 30px;
      }
      .auth-btn {
        background: #3b82f6;
        padding: 8px 22px;
        border-radius: 30px;
        color: #fff;
        font-weight: 600;
        text-decoration: none;
      }
      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #9ca3af;
        cursor: pointer;
      }
      .logout-btn {
        background: 0 0;
        border: 1px solid #3b82f6;
        color: #3b82f6;
        padding: 5px 12px;
        border-radius: 20px;
        cursor: pointer;
      }
      .main {
        padding: 48px 0 64px;
      }
      .profile-card,
      .admin-panel {
        background: #15181f;
        border-radius: 24px;
        padding: 32px;
        margin-bottom: 30px;
        border: 1px solid #2d3138;
      }
      .profile-card h1,
      .admin-panel h2 {
        margin-bottom: 24px;
        text-align: center;
        font-size: 1.8rem;
        background: linear-gradient(135deg, #fff, #3b82f6);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .section {
        margin-bottom: 32px;
        padding-bottom: 24px;
        border-bottom: 1px solid #2d3138;
      }
      .section h2 {
        font-size: 1.3rem;
        margin-bottom: 16px;
        color: #3b82f6;
      }
      .info-row {
        margin-bottom: 12px;
      }
      .info-label {
        font-weight: 600;
        color: #9ca3af;
        margin-right: 12px;
      }
      .input-group {
        margin-bottom: 16px;
      }
      .input-group input {
        width: 100%;
        padding: 10px;
        background: #1f2329;
        border: 1px solid #2d3138;
        border-radius: 12px;
        color: #fff;
      }
      button {
        background: #3b82f6;
        border: none;
        padding: 10px 20px;
        border-radius: 30px;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #2563eb;
      }
      .message {
        margin-top: 12px;
        padding: 8px;
        border-radius: 12px;
        font-size: 0.85rem;
      }
      .message.success {
        background: #22c55e33;
        border: 1px solid #22c55e;
        color: #22c55e;
      }
      .message.error {
        background: #ef444433;
        border: 1px solid #ef4444;
        color: #ef4444;
      }
      .users-table {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #2d3138;
      }
      th {
        color: #3b82f6;
      }
      .ban-btn {
        background: #ef4444;
        padding: 5px 12px;
        font-size: 0.8rem;
      }
      .ban-btn:hover {
        background: #dc2626;
      }
      .footer {
        background: #0f1117;
        border-top: 1px solid #1f2329;
        padding: 30px 0;
      }
      .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
      }
      @media (max-width: 768px) {
        .navbar {
          flex-direction: column;
          text-align: center;
        }
        .nav-links {
          justify-content: center;
        }
        td {
          display: block;
          text-align: right;
          padding-left: 50%;
          position: relative;
        }
        td::before {
          content: attr(data-label);
          position: absolute;
          left: 12px;
          font-weight: 700;
          color: #3b82f6;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="navbar">
          <div class="logo"><a href="index.html">ATBUY</a></div>
          <div class="nav-links">
            <a href="reviews.html">Отзывы</a
            ><a href="cart.html" class="cart-link">🛒 Корзина</a
            ><a href="https://t.me/your_telegram" target="_blank">Telegram</a
            ><a
              href="https://www.youtube.com/@atr1but"
              target="_blank"
              class="youtube-link"
              >🎬 YouTube</a
            >
            <div id="auth-section"></div>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="container">
        <div class="profile-card">
          <h1>Личный кабинет</h1>
          <div id="profileContent">Загрузка...</div>
        </div>
        <div id="adminPanel" class="admin-panel" style="display: none">
          <h2>Управление пользователями</h2>
          <div id="usersList">Загрузка...</div>
        </div>
      </div>
    </main>
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div>© 2025 ATBUY. Все права защищены.</div>
          <div>
            <a
              href="reviews.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Отзывы</a
            ><a
              href="terms.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Оферта</a
            ><a
              href="delivery.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Доставка</a
            ><a
              href="requisites.html"
              style="color: #9ca3af; text-decoration: none"
              >Реквизиты</a
            >
          </div>
        </div>
      </div>
    </footer>
    <script>
      const SUPABASE_URL = "https://buonqsikukvqbnbpuuco.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );
      let currentUser = null,
        isAdmin = false;

      // Обработка сброса пароля (если есть access_token)
      async function handlePasswordReset() {
        const urlParams = new URLSearchParams(window.location.search);
        const accessToken = urlParams.get("access_token");
        const type = urlParams.get("type");
        if (accessToken && type === "recovery") {
          const profileContent = document.getElementById("profileContent");
          profileContent.innerHTML = `
                    <div class="section">
                        <h2>Восстановление пароля</h2>
                        <div class="input-group">
                            <input type="password" id="newPassword" placeholder="Новый пароль (минимум 6 символов)">
                        </div>
                        <button id="updatePasswordBtn">Сохранить пароль</button>
                        <div id="resetMessage" class="message" style="display: none;"></div>
                    </div>
                `;
          document
            .getElementById("updatePasswordBtn")
            .addEventListener("click", async () => {
              const newPassword = document.getElementById("newPassword").value;
              const msgDiv = document.getElementById("resetMessage");
              if (!newPassword || newPassword.length < 6) {
                msgDiv.textContent = "Пароль должен быть не менее 6 символов";
                msgDiv.className = "message error";
                msgDiv.style.display = "block";
                return;
              }
              try {
                const { error } = await supabaseClient.auth.updateUser({
                  password: newPassword,
                });
                if (error) throw error;
                msgDiv.textContent =
                  "Пароль успешно изменён! Перенаправляем на страницу входа...";
                msgDiv.className = "message success";
                msgDiv.style.display = "block";
                setTimeout(() => (window.location.href = "login.html"), 2000);
              } catch (err) {
                msgDiv.textContent = "Ошибка: " + err.message;
                msgDiv.className = "message error";
                msgDiv.style.display = "block";
              }
            });
          return true; // показана форма сброса, обычный профиль не грузим
        }
        return false;
      }

      async function loadProfile() {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();
        if (!session) {
          window.location.href = "login.html";
          return;
        }
        currentUser = session.user;
        const { data: userData } = await supabaseClient
          .from("users")
          .select("is_admin")
          .eq("id", currentUser.id)
          .single();
        isAdmin =
          userData?.is_admin || currentUser.email === "vufysay@gmail.com";
        const currentName =
          currentUser.user_metadata?.name || currentUser.email;
        document.getElementById("profileContent").innerHTML = `
                <div class="section"><h2>Информация об аккаунте</h2><div class="info-row"><span class="info-label">Email:</span><span>${escapeHtml(currentUser.email)}</span></div><div class="info-row"><span class="info-label">Имя:</span><span id="currentNameDisplay">${escapeHtml(currentName)}</span></div></div>
                <div class="section"><h2>Изменить имя</h2><div class="input-group"><input type="text" id="newName" placeholder="Новое имя" value="${escapeHtml(currentName)}"></div><button id="updateNameBtn">Сохранить имя</button><div id="nameMessage" class="message" style="display:none;"></div></div>
                <div class="section"><h2>Изменить пароль</h2><p style="margin-bottom:16px;font-size:.9rem;color:#9ca3af;">На вашу почту будет отправлена ссылка для сброса пароля.</p><button id="resetPasswordBtn">Отправить ссылку</button><div id="passwordMessage" class="message" style="display:none;"></div></div>`;
        document
          .getElementById("updateNameBtn")
          .addEventListener("click", updateName);
        document
          .getElementById("resetPasswordBtn")
          .addEventListener("click", resetPassword);
        if (isAdmin) {
          document.getElementById("adminPanel").style.display = "block";
          loadAllUsers();
        } else {
          document.getElementById("adminPanel").style.display = "none";
        }
      }

      async function updateName() {
        const newName = document.getElementById("newName").value.trim();
        const msg = document.getElementById("nameMessage");
        if (!newName) {
          msg.textContent = "Имя не может быть пустым";
          msg.className = "message error";
          msg.style.display = "block";
          return;
        }
        const { error } = await supabaseClient.auth.updateUser({
          data: { name: newName },
        });
        if (error) {
          msg.textContent = "Ошибка: " + error.message;
          msg.className = "message error";
          msg.style.display = "block";
        } else {
          document.getElementById("currentNameDisplay").textContent =
            escapeHtml(newName);
          msg.textContent = "Имя обновлено!";
          msg.className = "message success";
          msg.style.display = "block";
          setTimeout(() => (msg.style.display = "none"), 3000);
          updateAuthHeader();
        }
      }

      async function resetPassword() {
        const msg = document.getElementById("passwordMessage");
        msg.textContent = "Отправляем...";
        msg.style.display = "block";
        const { error } = await supabaseClient.auth.resetPasswordForEmail(
          currentUser.email,
          { redirectTo: `${window.location.origin}/profile.html` },
        );
        if (error) {
          msg.textContent = "Ошибка: " + error.message;
          msg.className = "message error";
        } else {
          msg.textContent = "Ссылка отправлена на ваш email!";
          msg.className = "message success";
          setTimeout(() => (msg.style.display = "none"), 5000);
        }
      }

      async function loadAllUsers() {
        try {
          const { data, error } = await supabaseClient.rpc("get_all_users");
          if (error) {
            console.error(error);
            document.getElementById("usersList").innerHTML =
              `<p class="message error">Ошибка загрузки: ${escapeHtml(error.message)}</p>`;
            return;
          }
          let users = data;
          if (typeof users === "string") users = JSON.parse(users);
          if (!Array.isArray(users)) users = [];
          if (!users.length) {
            document.getElementById("usersList").innerHTML =
              "<p>Нет пользователей</p>";
            return;
          }
          let html = `<div class="users-table"><table><thead><tr><th>Имя</th><th>Email</th><th>Админ</th><th>Действия</th></tr></thead><tbody>`;
          users.forEach((u) => {
            html += `<tr><td data-label="Имя">${escapeHtml(u.name || "—")}</td><td data-label="Email">${escapeHtml(u.email)}</td><td data-label="Админ">${u.is_admin ? "Да" : "Нет"}</td><td data-label="Действия"><button class="ban-btn" data-user-id="${u.id}" data-user-email="${escapeHtml(u.email)}">🗑️ Удалить</button></td></tr>`;
          });
          html += `</tbody></table></div>`;
          document.getElementById("usersList").innerHTML = html;
          document.querySelectorAll(".ban-btn").forEach((btn) =>
            btn.addEventListener("click", async () => {
              const userId = btn.dataset.userId,
                userEmail = btn.dataset.userEmail;
              if (
                confirm(`Удалить пользователя ${userEmail}? Это необратимо.`)
              ) {
                const { error } = await supabaseClient.rpc(
                  "admin_delete_user",
                  { user_id: userId },
                );
                if (error) alert("Ошибка удаления: " + error.message);
                else {
                  alert("Пользователь удалён");
                  loadAllUsers();
                }
              }
            }),
          );
        } catch (err) {
          console.error(err);
          document.getElementById("usersList").innerHTML =
            '<p class="message error">Не удалось загрузить пользователей. Проверьте консоль.</p>';
        }
      }

      async function updateAuthHeader() {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();
        if (session) {
          const name = session.user.user_metadata?.name || session.user.email;
          const authSection = document.getElementById("auth-section");
          if (authSection)
            authSection.innerHTML = `<div class="user-info" id="userMenu"><span>👤 ${escapeHtml(name)}</span><button id="logoutBtn" class="logout-btn">Выйти</button></div>`;
          document
            .getElementById("logoutBtn")
            ?.addEventListener("click", async () => {
              await supabaseClient.auth.signOut();
              window.location.href = "index.html";
            });
          document
            .getElementById("userMenu")
            ?.addEventListener("click", (e) => {
              if (e.target.id !== "logoutBtn")
                window.location.href = "profile.html";
            });
        } else {
          const authSection = document.getElementById("auth-section");
          if (authSection)
            authSection.innerHTML = `<a href="login.html" class="auth-btn">Вход / Регистрация</a>`;
        }
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(
          /[&<>]/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m],
        );
      }

      window.addEventListener("load", async () => {
        await updateAuthHeader();
        const isResetMode = await handlePasswordReset();
        if (!isResetMode) {
          await loadProfile();
        }
      });
    </script>
  </body>
</html>
