      .section {
        margin-bottom: 32px;

      .section h2 {
        font-size: 1.3rem;

      }

        margin-bottom: 12px;
      }
      .info-label {
        font-weight: 600;

      .input-group {

      .input-group input {

      button {

      .message {

        border: 1px solid #ef4444;

      .users-table,

      .users-table table,
      .orders-table table {
        width: 100%;

      .users-table th,
      .orders-table th,
      .users-table td,
      .orders-table td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #2d3138;

      .users-table th,

        color: #3b82f6;

      .ban-btn {
        background: #ef4444;

      .accounts-list {
        display: flex;

      .account-item {
        display: flex;

        background: #1f2329;
        padding: 10px 16px;
        border-radius: 12px;

      .account-email {

      .switch-account-btn {
        background: #3b82f6;
        border: none;
        padding: 6px 12px;
        border-radius: 20px;

      .remove-account-btn {
        background: #ef4444;

        padding: 6px 12px;
        border-radius: 20px;

        cursor: pointer;
        font-size: 0.8rem;
        margin-left: 8px;

      .footer {
        background: #0f1117;
        border-top: 1px solid #1f2329;
        padding: 30px 0;
      }
      .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: center;

        gap: 20px;
      }
      @media (max-width: 768px) {
        .navbar {
          flex-direction: column;
          text-align: center;

          position: absolute;
          left: 12px;
          font-weight: 700;

    <script>
      const SUPABASE_URL = "https://buonqsikukvqbnbpuuco.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );
      let currentUser = null,
        isAdmin = false;

      const SESSIONS_STORAGE_KEY = "atbuy_saved_sessions";

      // --- Управление аккаунтами ---
      async function saveCurrentSession() {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();
        if (!session) return;
        const sessions = JSON.parse(
          localStorage.getItem(SESSIONS_STORAGE_KEY) || "[]",
        );
        const existingIndex = sessions.findIndex(
          (s) => s.user.id === session.user.id,
        );
        const sessionData = {
          user: {
            id: session.user.id,
            email: session.user.email,
            name: session.user.user_metadata?.name,
          },
          access_token: session.access_token,
          refresh_token: session.refresh_token,
          expires_at: session.expires_at,
        };
        if (existingIndex !== -1) sessions[existingIndex] = sessionData;
        else sessions.push(sessionData);
        localStorage.setItem(SESSIONS_STORAGE_KEY, JSON.stringify(sessions));
        renderAccountsList();
      }

      function getSavedAccounts() {
        return JSON.parse(localStorage.getItem(SESSIONS_STORAGE_KEY) || "[]");
      }

      async function switchToAccount(sessionData) {
        const { error } = await supabaseClient.auth.setSession({
          access_token: sessionData.access_token,
          refresh_token: sessionData.refresh_token,
        });
        if (error) {
          alert("Ошибка переключения: " + error.message);
          removeAccount(sessionData.user.id);
        } else {
          await updateAuthHeader();
          await loadProfile();
          alert(`Переключено на ${sessionData.user.email}`);
        }
      }

      function removeAccount(userId) {
        let sessions = getSavedAccounts();
        sessions = sessions.filter((s) => s.user.id !== userId);
        localStorage.setItem(SESSIONS_STORAGE_KEY, JSON.stringify(sessions));
        renderAccountsList();
      }

      function renderAccountsList() {
        const container = document.getElementById("accountsList");
        if (!container) return;
        const sessions = getSavedAccounts();
        if (!sessions.length) {
          container.innerHTML =
            '<p style="color:#9ca3af;">Сохранённых аккаунтов нет. Добавьте новый аккаунт.</p>';
          return;
        }
        let html = "";
        for (const sess of sessions) {
          html += `
                    <div class="account-item">
                        <div class="account-email">${escapeHtml(sess.user.email)} (${escapeHtml(sess.user.name || "без имени")})</div>
                        <div>
                            <button class="switch-account-btn" data-user-id="${sess.user.id}">Переключиться</button>
                            <button class="remove-account-btn" data-user-id="${sess.user.id}">Удалить</button>
                        </div>
                    </div>
                `;
        }
        container.innerHTML = html;
        document.querySelectorAll(".switch-account-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const userId = btn.dataset.userId;
            const sessions = getSavedAccounts();
            const session = sessions.find((s) => s.user.id === userId);
            if (session) await switchToAccount(session);
          });
        });
        document.querySelectorAll(".remove-account-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            const userId = btn.dataset.userId;
            removeAccount(userId);
          });
        });
      }

      function addAccount() {
        window.location.href = "login.html?return_to=profile";
      }

      // --- 2FA ---
      let currentFactorId = null;
      async function load2FAStatus() {
        if (!currentUser) return;
        const { data, error } = await supabaseClient
          .from("users")
          .select("is_2fa_enabled")
          .eq("id", currentUser.id)
          .single();
        if (error) {
          console.error("Ошибка загрузки статуса 2FA:", error);
          document.getElementById("twofa-status").innerHTML =
            '<p class="message error">Ошибка загрузки статуса 2FA</p>';
          return;
        }
        const isEnabled = data?.is_2fa_enabled || false;
        const twofaStatusDiv = document.getElementById("twofa-status");
        const twofaSetupDiv = document.getElementById("twofa-setup");
        if (isEnabled) {
          twofaStatusDiv.innerHTML = `
                    <div class="info-row">
                        <span class="info-label">Статус:</span>
                        <span class="info-value" style="color: #22c55e;">✅ Активна</span>
                        <button id="disable-2fa-btn" class="ban-btn" style="background-color: #ef4444; margin-left: 10px;">Отключить 2FA</button>
                    </div>
                `;
          document
            .getElementById("disable-2fa-btn")
            ?.addEventListener("click", disable2FA);
          twofaSetupDiv.style.display = "none";
        } else {
          twofaStatusDiv.innerHTML = `
                    <div class="info-row">
                        <span class="info-label">Статус:</span>
                        <span class="info-value" style="color: #9ca3af;">⭕ Не активна</span>
                        <button id="setup-2fa-btn" class="action-btn" style="background-color: #3b82f6; padding: 5px 10px; margin-left: 10px;">Настроить 2FA</button>
                    </div>
                `;
          document
            .getElementById("setup-2fa-btn")
            ?.addEventListener("click", start2FASetup);
          twofaSetupDiv.style.display = "none";
        }
      }

      async function start2FASetup() {
        const { data, error } = await supabaseClient.auth.mfa.enroll({
          factorType: "totp",
          issuer: "ATBUY",
        });
        if (error) {
          document.getElementById("setup-message").innerHTML =
            `<div class="message error">Ошибка: ${error.message}</div>`;
          document.getElementById("setup-message").style.display = "block";
          return;
        }
        currentFactorId = data.id;
        const qrCodeSvg = data.totp.qr_code;
        const secret = data.totp.secret;
        document.getElementById("qr-container").innerHTML = `
                <p>1. Отсканируйте QR-код в приложении-аутентификаторе (Google Authenticator, Яндекс Ключ и т.д.)</p>
                <div style="background: white; padding: 10px; display: inline-block; margin: 10px 0;">${qrCodeSvg}</div>
                <p>2. Или введите этот код вручную: <strong>${secret}</strong></p>
                <p>3. После добавления введите код из приложения ниже:</p>
            `;
        document.getElementById("twofa-setup").style.display = "block";
        document.getElementById("twofa-status").style.display = "none";
      }

      async function enable2FA() {
        const code = document.getElementById("totp-code").value.trim();
        if (!code || code.length !== 6) {
          document.getElementById("setup-message").innerHTML =
            '<div class="message error">Введите 6-значный код</div>';
          document.getElementById("setup-message").style.display = "block";
          return;
        }
        const { data: challengeData, error: challengeError } =
          await supabaseClient.auth.mfa.challenge({
            factorId: currentFactorId,
          });
        if (challengeError) {
          document.getElementById("setup-message").innerHTML =
            `<div class="message error">Ошибка: ${challengeError.message}</div>`;
          document.getElementById("setup-message").style.display = "block";
          return;
        }
        const { error: verifyError } = await supabaseClient.auth.mfa.verify({
          factorId: currentFactorId,
          challengeId: challengeData.id,
          code: code,
        });
        if (verifyError) {
          document.getElementById("setup-message").innerHTML =
            `<div class="message error">Неверный код: ${verifyError.message}</div>`;
          document.getElementById("setup-message").style.display = "block";
          return;
        }
        const { error: updateError } = await supabaseClient
          .from("users")
          .update({ is_2fa_enabled: true })
          .eq("id", currentUser.id);
        if (updateError) {
          document.getElementById("setup-message").innerHTML =
            '<div class="message error">Ошибка сохранения настроек 2FA</div>';
          document.getElementById("setup-message").style.display = "block";
          return;
        }
        document.getElementById("setup-message").innerHTML =
          '<div class="message success">2FA успешно включена!</div>';
        document.getElementById("setup-message").style.display = "block";
        document.getElementById("twofa-setup").style.display = "none";
        load2FAStatus();
      }

      async function disable2FA() {
        if (
          !confirm(
            "Вы уверены, что хотите отключить двухфакторную аутентификацию?",
          )
        )
          return;
        const { error: updateError } = await supabaseClient
          .from("users")
          .update({ is_2fa_enabled: false })
          .eq("id", currentUser.id);
        if (updateError) {
          alert("Ошибка отключения 2FA: " + updateError.message);
          return;
        }
        const { data: factors } = await supabaseClient.auth.mfa.listFactors();
        if (factors && factors.totp && factors.totp.length) {
          await supabaseClient.auth.mfa.unenroll({
            factorId: factors.totp[0].id,
          });
        }
        load2FAStatus();
        alert("2FA отключена");
      }

      // --- Остальные функции ---
      async function handlePasswordReset() {
        const urlParams = new URLSearchParams(window.location.search);
        const accessToken = urlParams.get("access_token");
        const type = urlParams.get("type");
        if (accessToken && type === "recovery") {
          document.getElementById("profileContent").innerHTML = `
                    <div class="section"><h2>Восстановление пароля</h2><div class="input-group"><input type="password" id="newPassword" placeholder="Новый пароль (минимум 6 символов)"></div><button id="updatePasswordBtn">Сохранить пароль</button><div id="resetMessage" class="message" style="display:none;"></div></div>
                `;
          document
            .getElementById("updatePasswordBtn")
            .addEventListener("click", async () => {
              const newPassword = document.getElementById("newPassword").value;
              const msgDiv = document.getElementById("resetMessage");
              if (!newPassword || newPassword.length < 6) {
                msgDiv.textContent = "Пароль должен быть не менее 6 символов";
                msgDiv.className = "message error";
                msgDiv.style.display = "block";
                return;
              }
              try {
                const { error } = await supabaseClient.auth.updateUser({
                  password: newPassword,
                });
                if (error) throw error;
                msgDiv.textContent =
                  "Пароль успешно изменён! Перенаправляем...";
                msgDiv.className = "message success";
                msgDiv.style.display = "block";
                setTimeout(() => (window.location.href = "login.html"), 2000);
              } catch (err) {
                msgDiv.textContent = "Ошибка: " + err.message;
                msgDiv.className = "message error";
                msgDiv.style.display = "block";
              }
            });
          return true;
        }
        return false;
      }

      async function loadProfile() {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();
        if (!session) {
          window.location.href = "login.html";
          return;
        }
        currentUser = session.user;
        await saveCurrentSession();
        const { data: userData } = await supabaseClient
          .from("users")
          .select("is_admin")
          .eq("id", currentUser.id)
          .single();
        isAdmin =
          userData?.is_admin || currentUser.email === "vufysay@gmail.com";
        const currentName =
          currentUser.user_metadata?.name || currentUser.email;
        document.getElementById("profileContent").innerHTML = `
                <div class="section"><h2>Информация об аккаунте</h2><div class="info-row"><span class="info-label">Email:</span><span>${escapeHtml(currentUser.email)}</span></div><div class="info-row"><span class="info-label">Имя:</span><span id="currentNameDisplay">${escapeHtml(currentName)}</span></div></div>
                <div class="section"><h2>Изменить имя</h2><div class="input-group"><input type="text" id="newName" placeholder="Новое имя" value="${escapeHtml(currentName)}"></div><button id="updateNameBtn">Сохранить имя</button><div id="nameMessage" class="message" style="display:none;"></div></div>
                <div class="section"><h2>Изменить пароль</h2><p style="margin-bottom:16px;font-size:.9rem;color:#9ca3af;">На вашу почту будет отправлена ссылка для сброса пароля.</p><button id="resetPasswordBtn">Отправить ссылку</button><div id="passwordMessage" class="message" style="display:none;"></div></div>
                <div class="section"><h2>Двухфакторная аутентификация (2FA)</h2><div id="twofa-status"></div><div id="twofa-setup" style="display: none;"><div id="qr-container"></div><div class="input-group"><label>Код из приложения-аутентификатора</label><input type="text" id="totp-code" placeholder="6-значный код" autocomplete="off"></div><button id="enable-2fa-btn">Подтвердить и включить</button><div id="setup-message" class="message" style="display: none;"></div></div></div>
                <div class="section"><h2>Управление аккаунтами</h2><button id="addAccountBtn" class="action-btn" style="background:#3b82f6;">➕ Добавить аккаунт</button><div id="accountsList" class="accounts-list"></div></div>
            `;
        document
          .getElementById("updateNameBtn")
          .addEventListener("click", updateName);
        document
          .getElementById("resetPasswordBtn")
          .addEventListener("click", resetPassword);
        document
          .getElementById("addAccountBtn")
          .addEventListener("click", addAccount);
        document
          .getElementById("enable-2fa-btn")
          ?.addEventListener("click", enable2FA);
        renderAccountsList();
        load2FAStatus();
        if (isAdmin) {
          document.getElementById("adminPanel").style.display = "block";
          document.getElementById("adminOrdersPanel").style.display = "block";
          loadAllUsers();
          loadAllOrders();
        }
      }

      async function updateName() {
        const newName = document.getElementById("newName").value.trim();
        const msg = document.getElementById("nameMessage");
        if (!newName) {
          msg.textContent = "Имя не может быть пустым";
          msg.className = "message error";
          msg.style.display = "block";
          return;
        }
        const { error } = await supabaseClient.auth.updateUser({
          data: { name: newName },
        });
        if (error) {
          msg.textContent = "Ошибка: " + error.message;
          msg.className = "message error";
          msg.style.display = "block";
        } else {
          document.getElementById("currentNameDisplay").textContent =
            escapeHtml(newName);
          msg.textContent = "Имя обновлено!";
          msg.className = "message success";
          msg.style.display = "block";
          setTimeout(() => (msg.style.display = "none"), 3000);
          updateAuthHeader();
        }
      }

      async function resetPassword() {
        const msg = document.getElementById("passwordMessage");
        msg.textContent = "Отправляем...";
        msg.style.display = "block";
        const { error } = await supabaseClient.auth.resetPasswordForEmail(
          currentUser.email,
          { redirectTo: `${window.location.origin}/profile.html` },
        );
        if (error) {
          msg.textContent = "Ошибка: " + error.message;
          msg.className = "message error";
        } else {
          msg.textContent = "Ссылка отправлена на ваш email!";
          msg.className = "message success";
          setTimeout(() => (msg.style.display = "none"), 5000);
        }
      }

      async function loadAllUsers() {
        try {
          const { data, error } = await supabaseClient
            .from("users")
            .select("id, name, email, is_admin, created_at")
            .order("created_at", { ascending: false });
          if (error) throw error;
          if (!data.length) {
            document.getElementById("usersList").innerHTML =
              "<p>Нет пользователей</p>";
            return;
          }
          let html = `<div class="users-table"><table><thead><tr><th>Имя</th><th>Email</th><th>Админ</th><th>Действия</th></tr></thead><tbody>`;
          for (const user of data) {
            html += `<tr>
                        <td data-label="Имя">${escapeHtml(user.name || "—")}</td>
                        <td data-label="Email">${escapeHtml(user.email || "—")}</td>
                        <td data-label="Админ">${user.is_admin ? "Да" : "Нет"}</td>
                        <td data-label="Действия"><button class="ban-btn" data-user-id="${user.id}" data-user-email="${escapeHtml(user.email)}">🗑️ Удалить</button></td>
                    </tr>`;
          }
          html += `</tbody></table></div>`;
          document.getElementById("usersList").innerHTML = html;
          document.querySelectorAll(".ban-btn").forEach((btn) =>
            btn.addEventListener("click", async () => {
              const userId = btn.dataset.userId,
                userEmail = btn.dataset.userEmail;
              if (
                confirm(`Удалить пользователя ${userEmail}? Это необратимо.`)
              ) {
                const { error } = await supabaseClient.rpc(
                  "admin_delete_user",
                  { user_id: userId },
                );
                if (error) alert("Ошибка удаления: " + error.message);
                else {
                  alert("Пользователь удалён");
                  loadAllUsers();
                }
              }
            }),
          );
        } catch (err) {
          console.error(err);
          document.getElementById("usersList").innerHTML =
            '<p class="message error">Ошибка загрузки пользователей</p>';
        }
      }

      async function loadAllOrders() {
        const { data, error } = await supabaseClient
          .from("orders")
          .select("*")
          .order("created_at", { ascending: false });
        if (error) {
          console.error(error);
          document.getElementById("adminOrdersContainer").innerHTML =
            '<p class="message error">Ошибка загрузки заказов</p>';
          return;
        }
        if (!data.length) {
          document.getElementById("adminOrdersContainer").innerHTML =
            "<p>Нет заказов</p>";
          return;
        }
        let html = `<div class="orders-table"><table><thead><tr><th>ID</th><th>Пользователь</th><th>Сумма</th><th>Статус</th><th>Дата</th><th>Действия</th></tr></thead><tbody>`;
        for (const order of data) {
          const { data: user, error: userError } = await supabaseClient
            .from("users")
            .select("email")
            .eq("id", order.user_id)
            .single();
          let userEmail = "Неизвестно";
          if (!userError && user && user.email) userEmail = user.email;
          html += `
                    <tr>
                        <td data-label="ID">${order.id}</td>
                        <td data-label="Пользователь">${escapeHtml(userEmail)}</td>
                        <td data-label="Сумма">${order.total_amount} ₽</td>
                        <td data-label="Статус">${order.status}</td>
                        <td data-label="Дата">${new Date(order.created_at).toLocaleDateString()}</td>
                        <td data-label="Действия"><a href="order-details.html?id=${order.id}" style="color:#3b82f6;">Открыть</a></td>
                    </tr>
                `;
        }
        html += `</tbody></table></div>`;
        document.getElementById("adminOrdersContainer").innerHTML = html;
      }

      async function updateAuthHeader() {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();
        const authSection = document.getElementById("auth-section");
        const adminLinks = document.getElementById("admin-links");
        if (session) {
          const name = session.user.user_metadata?.name || session.user.email;
          if (authSection)
            authSection.innerHTML = `<div class="user-info" id="userMenu"><span>👤 ${escapeHtml(name)}</span><button id="logoutBtn" class="logout-btn">Выйти</button></div>`;
          document
            .getElementById("logoutBtn")
            ?.addEventListener("click", async () => {
              await supabaseClient.auth.signOut();
              window.location.href = "index.html";
            });
          document
            .getElementById("userMenu")
            ?.addEventListener("click", (e) => {
              if (e.target.id !== "logoutBtn")
                window.location.href = "profile.html";
            });
          const { data: userData } = await supabaseClient
            .from("users")
            .select("is_admin")
            .eq("id", session.user.id)
            .single();
          const isAdminUser =
            userData?.is_admin || session.user.email === "vufysay@gmail.com";
          if (adminLinks)
            adminLinks.innerHTML = isAdminUser
              ? `<a href="admin-chats.html" class="cart-link">📋 Чаты поддержки</a>`
              : "";
        } else {
          if (authSection)
            authSection.innerHTML = `<a href="login.html" class="auth-btn">Вход / Регистрация</a>`;
          if (adminLinks) adminLinks.innerHTML = "";
        }
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(
          /[&<>]/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m],
        );
      }

      window.addEventListener("load", async () => {
        await updateAuthHeader();
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get("return_to") === "profile")
          await saveCurrentSession();
        const isResetMode = await handlePasswordReset();
        if (!isResetMode) await loadProfile();
      });
    </script>
  </body>
</html>
