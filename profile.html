<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATBUY — Личный кабинет</title>
    <style>
      /* ... предыдущие стили ... */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0a0c10;
        color: #eef2ff;
      }
      .header {
        background: #0f1117;
        border-bottom: 1px solid #1f2329;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 0 24px;
      }
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
        flex-wrap: wrap;
        gap: 16px;
      }
      .logo a {
        font-size: 1.8rem;
        font-weight: 800;
        text-decoration: none;
        color: #3b82f6;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 28px;
        flex-wrap: wrap;
      }
      .nav-links a {
        text-decoration: none;
        color: #9ca3af;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: #3b82f6;
      }
      .cart-link {
        background: #3b82f6;
        padding: 6px 14px;
        border-radius: 30px;
        color: #fff !important;
      }
      .youtube-link {
        background: #ff0000;
        color: #fff !important;
        padding: 6px 14px;
        border-radius: 30px;
      }
      .auth-btn {
        background: #3b82f6;
        padding: 8px 22px;
        border-radius: 30px;
        color: #fff;
        font-weight: 600;
        text-decoration: none;
      }
      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #9ca3af;
        cursor: pointer;
      }
      .logout-btn {
        background: 0 0;
        border: 1px solid #3b82f6;
        color: #3b82f6;
        padding: 5px 12px;
        border-radius: 20px;
        cursor: pointer;
      }
      .main {
        padding: 48px 0 64px;
      }
      .profile-card,
      .admin-panel {
        background: #15181f;
        border-radius: 24px;
        padding: 32px;
        margin-bottom: 30px;
        border: 1px solid #2d3138;
      }
      .profile-card h1,
      .admin-panel h2 {
        margin-bottom: 24px;
        text-align: center;
        font-size: 1.8rem;
        background: linear-gradient(135deg, #fff, #3b82f6);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .section {
        margin-bottom: 32px;
        padding-bottom: 24px;
        border-bottom: 1px solid #2d3138;
      }
      .section h2 {
        font-size: 1.3rem;
        margin-bottom: 16px;
        color: #3b82f6;
      }
      .info-row {
        margin-bottom: 12px;
      }
      .info-label {
        font-weight: 600;
        color: #9ca3af;
        margin-right: 12px;
      }
      .input-group {
        margin-bottom: 16px;
      }
      .input-group input {
        width: 100%;
        padding: 10px;
        background: #1f2329;
        border: 1px solid #2d3138;
        border-radius: 12px;
        color: #fff;
      }
      button {
        background: #3b82f6;
        border: none;
        padding: 10px 20px;
        border-radius: 30px;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #2563eb;
      }
      .message {
        margin-top: 12px;
        padding: 8px;
        border-radius: 12px;
        font-size: 0.85rem;
      }
      .message.success {
        background: #22c55e33;
        border: 1px solid #22c55e;
        color: #22c55e;
      }
      .message.error {
        background: #ef444433;
        border: 1px solid #ef4444;
        color: #ef4444;
      }
      .users-table,
      .orders-table {
        width: 100%;
        overflow-x: auto;
        margin-top: 16px;
      }
      .users-table table,
      .orders-table table {
        width: 100%;
        border-collapse: collapse;
        background: #1f2329;
        border-radius: 12px;
        overflow: hidden;
      }
      .users-table th,
      .orders-table th,
      .users-table td,
      .orders-table td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #2d3138;
      }
      .users-table th,
      .orders-table th {
        background: #15181f;
        color: #3b82f6;
        font-weight: 600;
      }
      .users-table tr:last-child td,
      .orders-table tr:last-child td {
        border-bottom: none;
      }
      .ban-btn {
        background: #ef4444;
        border: none;
        padding: 5px 12px;
        border-radius: 20px;
        color: #fff;
        cursor: pointer;
        font-size: 0.8rem;
      }
      .ban-btn:hover {
        background: #dc2626;
      }
      .footer {
        background: #0f1117;
        border-top: 1px solid #1f2329;
        padding: 30px 0;
      }
      .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
      }
      @media (max-width: 768px) {
        .navbar {
          flex-direction: column;
          text-align: center;
        }
        .nav-links {
          justify-content: center;
        }
        .users-table td,
        .orders-table td {
          display: block;
          text-align: right;
          padding-left: 50%;
          position: relative;
        }
        .users-table td::before,
        .orders-table td::before {
          content: attr(data-label);
          position: absolute;
          left: 12px;
          font-weight: 700;
          color: #3b82f6;
        }
      }
      .twofa-toggle {
        margin: 20px 0;
      }
      .twofa-status {
        font-size: 1rem;
        margin-bottom: 12px;
      }
      .twofa-status.enabled {
        color: #22c55e;
      }
      .twofa-status.disabled {
        color: #9ca3af;
      }
      .btn-danger {
        background: #dc2626;
      }
      .btn-danger:hover {
        background: #b91c1c;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
    <script>
      (function () {
        emailjs.init("YIKBw4TxPT9yO7aCd");
      })();
    </script>
  </head>
  <body>
    <!-- ... шапка ... -->
    <main class="main">
      <div class="container">
        <div class="profile-card">
          <h1>Личный кабинет</h1>
          <div id="profileContent">Загрузка...</div>
          <div id="twofaSection" class="section" style="margin-top: 24px">
            <h2>Двухфакторная аутентификация</h2>
            <div id="twofaStatus" class="twofa-status disabled">
              Загрузка...
            </div>
            <div id="twofaButton"></div>
          </div>
        </div>
        <!-- ... админ-панели ... -->
      </div>
    </main>
    <footer>...</footer>
    <script>
      const SUPABASE_URL = "https://buonqsikukvqbnbpuuco.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );
      let currentUser = null;

      async function loadProfile() {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();
        if (!session) {
          window.location.href = "login.html";
          return;
        }
        currentUser = session.user;
        const currentName =
          currentUser.user_metadata?.name || currentUser.email;
        document.getElementById("profileContent").innerHTML = `
                <div class="section"><h2>Информация об аккаунте</h2><div class="info-row"><span class="info-label">Email:</span><span>${escapeHtml(currentUser.email)}</span></div><div class="info-row"><span class="info-label">Имя:</span><span id="currentNameDisplay">${escapeHtml(currentName)}</span></div></div>
                <div class="section"><h2>Изменить имя</h2><div class="input-group"><input type="text" id="newName" placeholder="Новое имя" value="${escapeHtml(currentName)}"></div><button id="updateNameBtn">Сохранить имя</button><div id="nameMessage" class="message" style="display:none;"></div></div>
            `;
        document
          .getElementById("updateNameBtn")
          .addEventListener("click", updateName);
        await load2FAStatus();
      }

      async function updateName() {
        const newName = document.getElementById("newName").value.trim();
        const msg = document.getElementById("nameMessage");
        if (!newName) {
          msg.textContent = "Имя не может быть пустым";
          msg.className = "message error";
          msg.style.display = "block";
          return;
        }
        const { error } = await supabaseClient.auth.updateUser({
          data: { name: newName },
        });
        if (error) {
          msg.textContent = "Ошибка: " + error.message;
          msg.className = "message error";
          msg.style.display = "block";
        } else {
          document.getElementById("currentNameDisplay").textContent =
            escapeHtml(newName);
          msg.textContent = "Имя обновлено!";
          msg.className = "message success";
          msg.style.display = "block";
          setTimeout(() => (msg.style.display = "none"), 3000);
        }
      }

      async function load2FAStatus() {
        const { data, error } = await supabaseClient
          .from("users")
          .select("is_2fa_enabled")
          .eq("id", currentUser.id)
          .single();
        if (error) {
          console.error(error);
          return;
        }
        const isEnabled = data?.is_2fa_enabled || false;
        const statusDiv = document.getElementById("twofaStatus");
        const buttonDiv = document.getElementById("twofaButton");
        if (isEnabled) {
          statusDiv.innerHTML = "✅ Активна";
          statusDiv.className = "twofa-status enabled";
          buttonDiv.innerHTML =
            '<button id="disable2faBtn" class="action-btn btn-danger">Отключить 2FA</button>';
          document
            .getElementById("disable2faBtn")
            .addEventListener("click", disable2FA);
        } else {
          statusDiv.innerHTML = "⭕ Не активна";
          statusDiv.className = "twofa-status disabled";
          buttonDiv.innerHTML =
            '<button id="enable2faBtn" class="action-btn">Включить 2FA</button>';
          document
            .getElementById("enable2faBtn")
            .addEventListener("click", enable2FA);
        }
      }

      async function sendVerificationCode(email, userId) {
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        const expiresAt = new Date(Date.now() + 10 * 60 * 1000).toISOString();
        await supabaseClient.from("email_verification_codes").insert({
          user_id: userId,
          code: code,
          expires_at: expiresAt,
        });
        const serviceId = "service_9od2h3e";
        const templateId = "template_2fa";
        await emailjs.send(serviceId, templateId, {
          to_email: email,
          code: code,
        });
        return code;
      }

      async function enable2FA() {
        const code = await sendVerificationCode(
          currentUser.email,
          currentUser.id,
        );
        const userCode = prompt("Введите код, отправленный на вашу почту:");
        if (!userCode || userCode !== code) {
          alert("Неверный код. 2FA не включена.");
          return;
        }
        const { error } = await supabaseClient
          .from("users")
          .update({ is_2fa_enabled: true })
          .eq("id", currentUser.id);
        if (error) {
          alert("Ошибка включения 2FA");
          return;
        }
        alert("2FA успешно включена!");
        load2FAStatus();
      }

      async function disable2FA() {
        const { error } = await supabaseClient
          .from("users")
          .update({ is_2fa_enabled: false })
          .eq("id", currentUser.id);
        if (error) {
          alert("Ошибка отключения 2FA");
          return;
        }
        alert("2FA отключена");
        load2FAStatus();
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(
          /[&<>]/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m],
        );
      }

      // Также нужно добавить функцию checkAuth, как в предыдущих версиях, но без 2FA
      window.addEventListener("load", loadProfile);
    </script>
  </body>
</html>
