<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Восстановление пароля</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0a0c10;
        color: #eef2ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        background: #15181f;
        padding: 32px;
        border-radius: 24px;
        width: 100%;
        max-width: 400px;
        text-align: center;
      }
      input,
      button {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 12px;
        border: none;
      }
      input {
        background: #1f2329;
        color: #fff;
      }
      button {
        background: #3b82f6;
        color: #fff;
        cursor: pointer;
        font-weight: bold;
      }
      .message {
        margin-top: 12px;
        padding: 8px;
        border-radius: 8px;
      }
      .error {
        background: #dc262633;
        color: #ef4444;
      }
      .success {
        background: #22c55e33;
        color: #22c55e;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 id="title">Восстановление пароля</h2>
      <div id="form-area"></div>
      <div id="message"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://buonqsikukvqbnbpuuco.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      const formArea = document.getElementById("form-area");
      const messageDiv = document.getElementById("message");

      // ========== ШАГ 1: ВВОД EMAIL ==========
      formArea.innerHTML = `
      <input type="email" id="resetEmail" placeholder="Ваш email">
      <button id="sendCodeBtn">Отправить код</button>
    `;

      document
        .getElementById("sendCodeBtn")
        .addEventListener("click", async () => {
          const email = document.getElementById("resetEmail").value.trim();
          if (!email || !email.includes("@")) {
            messageDiv.innerHTML =
              '<div class="message error">Введите корректный email</div>';
            return;
          }
          try {
            const res = await fetch(`${SUPABASE_URL}/functions/v1/send-code`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, type: "reset" }),
            });
            if (!res.ok) throw new Error("Ошибка отправки кода");
            messageDiv.innerHTML =
              '<div class="message success">Код отправлен на почту!</div>';
            // Переходим к шагу 2
            document.getElementById("title").innerText =
              "Введите код и новый пароль";
            formArea.innerHTML = `
          <input type="text" id="resetCode" placeholder="Код из письма">
          <input type="password" id="newPassword" placeholder="Новый пароль (мин. 6 символов)">
          <button id="resetPasswordBtn">Сменить пароль</button>
        `;
            document
              .getElementById("resetPasswordBtn")
              .addEventListener("click", resetPassword);
          } catch (err) {
            messageDiv.innerHTML =
              '<div class="message error">' + err.message + "</div>";
          }
        });

      // ========== ШАГ 2: СМЕНА ПАРОЛЯ ==========
      async function resetPassword() {
        const code = document.getElementById("resetCode").value.trim();
        const newPassword = document.getElementById("newPassword").value.trim();
        if (!code || !newPassword || newPassword.length < 6) {
          messageDiv.innerHTML =
            '<div class="message error">Код и пароль (≥6 символов) обязательны</div>';
          return;
        }
        const email = document.getElementById("resetEmail").value; // сохранилось из первого шага
        try {
          const res = await fetch(
            `${SUPABASE_URL}/functions/v1/reset-password`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, code, newPassword }),
            },
          );
          const result = await res.json();
          if (result.success) {
            messageDiv.innerHTML =
              '<div class="message success">Пароль изменён! Перенаправляем на вход...</div>';
            setTimeout(() => (window.location.href = "login.html"), 2000);
          } else {
            messageDiv.innerHTML =
              '<div class="message error">' +
              (result.error || "Ошибка") +
              "</div>";
          }
        } catch (err) {
          messageDiv.innerHTML =
            '<div class="message error">' + err.message + "</div>";
        }
      }
    </script>
  </body>
</html>
