<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Восстановление пароля — ATBUY</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .container {
        background: #15181f;
        border-radius: 24px;
        padding: 32px;
        width: 100%;
        max-width: 420px;
        text-align: center;
        color: #fff;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      }
      h2 {
        margin-bottom: 24px;
        color: #3b82f6;
      }
      input,
      button {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 12px;
        border: none;
        font-size: 1rem;
      }
      input {
        background: #1f2329;
        color: #fff;
        border: 1px solid #2d3138;
      }
      button {
        background: #3b82f6;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #2563eb;
      }
      .message {
        margin-top: 12px;
        padding: 8px;
        border-radius: 8px;
        font-size: 0.9rem;
      }
      .error {
        background: rgba(239, 68, 68, 0.2);
        border: 1px solid #ef4444;
        color: #ef4444;
      }
      .success {
        background: rgba(34, 197, 94, 0.2);
        border: 1px solid #22c55e;
        color: #22c55e;
      }
      .back-link {
        margin-top: 20px;
        display: block;
        color: #9ca3af;
        text-decoration: none;
        font-size: 0.9rem;
      }
      .back-link:hover {
        color: #3b82f6;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
    <script>
      (function () {
        emailjs.init("YIKBw4TxPT9yO7aCd");
      })();
    </script>
  </head>
  <body>
    <div class="container">
      <h2 id="title">Восстановление пароля</h2>
      <div id="form-area"></div>
      <div id="message" class="message" style="display: none"></div>
      <a href="login.html" class="back-link">← Вернуться ко входу</a>
    </div>

    <script>
      const SUPABASE_URL = "https://functions.yandexcloud.net/d4ed5hav41lhcrdt3rq6?path=";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      // Переменные для хранения состояния
      let pendingResetCode = null;
      let pendingResetExpires = null;
      let pendingResetEmail = null;

      const formArea = document.getElementById("form-area");
      const messageDiv = document.getElementById("message");
      const title = document.getElementById("title");

      // ========== ШАГ 1: ввод email ==========
      function showEmailStep() {
        title.innerText = "Восстановление пароля";
        formArea.innerHTML = `
          <input type="email" id="resetEmail" placeholder="Ваш email">
          <button id="sendCodeBtn">Отправить код</button>
        `;
        document
          .getElementById("sendCodeBtn")
          .addEventListener("click", sendCode);
      }

      async function sendCode() {
        const email = document.getElementById("resetEmail").value.trim();
        if (!email || !email.includes("@")) {
          showMessage("Введите корректный email", true);
          return;
        }

        // Генерируем код и сохраняем
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        pendingResetCode = code;
        pendingResetExpires = Date.now() + 10 * 60 * 1000;
        pendingResetEmail = email;

        try {
          await emailjs.send("service_9od2h3e", "template_2fa", {
            to_email: email,
            message: `Ваш код для сброса пароля: ${code}`,
            subject: "Сброс пароля ATBUY",
          });
          showMessage("Код отправлен на почту!", false);
          // Переходим к шагу 2
          showCodeStep();
        } catch (err) {
          showMessage(
            "Ошибка отправки кода: " + (err.text || err.message),
            true,
          );
        }
      }

      // ========== ШАГ 2: ввод кода ==========
      function showCodeStep() {
        title.innerText = "Введите код";
        formArea.innerHTML = `
          <input type="text" id="resetCode" placeholder="6-значный код">
          <button id="verifyCodeBtn">Проверить код</button>
        `;
        document
          .getElementById("verifyCodeBtn")
          .addEventListener("click", verifyCode);
      }

      function verifyCode() {
        const enteredCode = document.getElementById("resetCode").value.trim();
        if (
          enteredCode !== pendingResetCode ||
          Date.now() > pendingResetExpires
        ) {
          showMessage("Неверный или просроченный код", true);
          return;
        }
        // Код верен — показываем форму нового пароля
        showNewPasswordStep();
      }

      // ========== ШАГ 3: новый пароль ==========
      function showNewPasswordStep() {
        title.innerText = "Новый пароль";
        formArea.innerHTML = `
          <input type="password" id="newPassword" placeholder="Новый пароль (мин. 6 символов)">
          <button id="resetPasswordBtn">Сменить пароль</button>
        `;
        document
          .getElementById("resetPasswordBtn")
          .addEventListener("click", resetPassword);
      }

      async function resetPassword() {
        const newPassword = document.getElementById("newPassword").value.trim();
        if (!newPassword || newPassword.length < 6) {
          showMessage("Пароль должен быть не менее 6 символов", true);
          return;
        }

        try {
          const res = await fetch(
            `${SUPABASE_URL}/functions/v1/reset-password-by-code`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email: pendingResetEmail, newPassword }),
            },
          );
          const result = await res.json();
          if (result.success) {
            showMessage(
              "Пароль успешно изменён! Перенаправляем на вход...",
              false,
            );
            setTimeout(() => (window.location.href = "login.html"), 2000);
          } else {
            showMessage(result.error || "Ошибка смены пароля", true);
          }
        } catch (err) {
          showMessage("Ошибка: " + err.message, true);
        }
      }

      function showMessage(text, isError = false) {
        messageDiv.textContent = text;
        messageDiv.className = "message " + (isError ? "error" : "success");
        messageDiv.style.display = "block";
      }

      // Запуск первого шага при загрузке
      window.addEventListener("load", () => {
        showEmailStep();
      });
    </script>
  </body>
</html>
