<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Восстановление пароля</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0a0c10;
        color: #eef2ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        background: #15181f;
        padding: 32px;
        border-radius: 24px;
        width: 100%;
        max-width: 400px;
        text-align: center;
      }
      input,
      button {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 12px;
        border: none;
      }
      input {
        background: #1f2329;
        color: #fff;
      }
      button {
        background: #3b82f6;
        color: #fff;
        cursor: pointer;
        font-weight: bold;
      }
      .message {
        margin-top: 12px;
        padding: 8px;
        border-radius: 8px;
      }
      .error {
        background: #dc262633;
        color: #ef4444;
      }
      .success {
        background: #22c55e33;
        color: #22c55e;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="container">
      <h2 id="title">Восстановление пароля</h2>
      <div id="form-area"></div>
      <div id="message"></div>
    </div>
    <script>
      const SUPABASE_URL = "https://buonqsikukvqbnbpuuco.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      // Функция для получения параметров из URL (из хэша или из строки запроса)
      function getUrlParams() {
        let params = new URLSearchParams(window.location.search);
        if (params.toString() === "") {
          // Если в search пусто, пробуем взять из хэша (без #)
          const hash = window.location.hash.substring(1);
          params = new URLSearchParams(hash);
        }
        return {
          access_token: params.get("access_token"),
          type: params.get("type"),
          refresh_token: params.get("refresh_token"),
        };
      }

      const { access_token, type } = getUrlParams();
      const formArea = document.getElementById("form-area");
      const messageDiv = document.getElementById("message");

      if (access_token && type === "recovery") {
        // Режим сброса пароля – показываем форму для нового пароля
        document.getElementById("title").innerText = "Установите новый пароль";
        formArea.innerHTML = `
            <input type="password" id="newPassword" placeholder="Новый пароль (мин. 6 символов)">
            <button id="updatePasswordBtn">Сохранить пароль</button>
        `;
        document
          .getElementById("updatePasswordBtn")
          .addEventListener("click", async () => {
            const newPassword = document.getElementById("newPassword").value;
            if (!newPassword || newPassword.length < 6) {
              messageDiv.innerHTML =
                '<div class="message error">Пароль должен быть не менее 6 символов</div>';
              return;
            }
            try {
              const { error } = await supabaseClient.auth.updateUser({
                password: newPassword,
              });
              if (error) throw error;
              messageDiv.innerHTML =
                '<div class="message success">Пароль успешно изменён! Перенаправляем на страницу входа...</div>';
              setTimeout(() => (window.location.href = "login.html"), 2000);
            } catch (err) {
              messageDiv.innerHTML =
                '<div class="message error">Ошибка: ' + err.message + "</div>";
            }
          });
      } else {
        // Обычный режим – форма для отправки ссылки
        formArea.innerHTML = `
            <input type="email" id="resetEmail" placeholder="Ваш email">
            <button id="sendResetLink">Отправить ссылку для сброса</button>
        `;
        document
          .getElementById("sendResetLink")
          .addEventListener("click", async () => {
            const email = document.getElementById("resetEmail").value.trim();
            if (!email || !email.includes("@")) {
              messageDiv.innerHTML =
                '<div class="message error">Введите корректный email</div>';
              return;
            }
            try {
              const { error } = await supabaseClient.auth.resetPasswordForEmail(
                email,
                {
                  redirectTo: `${window.location.origin}/reset-password.html`,
                },
              );
              if (error) throw error;
              messageDiv.innerHTML =
                '<div class="message success">Ссылка для сброса пароля отправлена на ваш email!</div>';
              document.getElementById("resetEmail").value = "";
            } catch (err) {
              messageDiv.innerHTML =
                '<div class="message error">Ошибка: ' + err.message + "</div>";
            }
          });
      }
    </script>
  </body>
</html>
