<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATBUY — Восстановление пароля</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .reset-container {
        background: #fff;
        border-radius: 24px;
        box-shadow: 0 20px 40px #0003;
        width: 100%;
        max-width: 460px;
        padding: 32px 28px;
        text-align: center;
      }
      h1 {
        font-size: 1.8rem;
        margin-bottom: 16px;
        color: #1f2937;
      }
      p {
        color: #6b7280;
        margin-bottom: 24px;
        font-size: 0.95rem;
      }
      .input-group {
        margin-bottom: 20px;
        text-align: left;
      }
      .input-group label {
        display: block;
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 6px;
        color: #374151;
      }
      .input-group input {
        width: 100%;
        padding: 12px 16px;
        font-size: 1rem;
        border: 1.5px solid #e2e8f0;
        border-radius: 16px;
        transition: 0.2s;
        outline: 0;
      }
      .input-group input:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px #4f46e533;
      }
      button {
        width: 100%;
        background: linear-gradient(105deg, #4f46e5, #7c3aed);
        border: none;
        padding: 14px;
        border-radius: 40px;
        color: #fff;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        margin-top: 8px;
      }
      button:hover {
        background: linear-gradient(105deg, #4338ca, #6d28d9);
      }
      .message {
        margin-top: 20px;
        padding: 12px;
        border-radius: 16px;
        font-size: 0.9rem;
        display: none;
      }
      .message.success {
        background: #d1fae5;
        color: #065f46;
        border: 1px solid #10b981;
      }
      .message.error {
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #ef4444;
      }
      .back-link {
        display: inline-block;
        margin-top: 20px;
        color: #4f46e5;
        text-decoration: none;
        font-size: 0.9rem;
      }
      .back-link:hover {
        text-decoration: underline;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="reset-container">
      <h1>Восстановление пароля</h1>
      <p>Введите ваш email, и мы отправим ссылку для сброса пароля</p>
      <div class="input-group">
        <label>Электронная почта</label>
        <input type="email" id="resetEmail" placeholder="example@mail.ru" />
      </div>
      <button id="resetBtn">Отправить ссылку</button>
      <div id="messageBox" class="message"></div>
      <a href="login.html" class="back-link">← Вернуться ко входу</a>
    </div>
    <script>
      const SUPABASE_URL = "https://buonqsikukvqbnbpuuco.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );
      const resetBtn = document.getElementById("resetBtn");
      const emailInput = document.getElementById("resetEmail");
      const messageBox = document.getElementById("messageBox");

      async function resetPassword() {
        const email = emailInput.value.trim();
        if (!email) {
          showMessage("Введите email", "error");
          return;
        }
        if (!email.includes("@")) {
          showMessage("Введите корректный email", "error");
          return;
        }
        resetBtn.disabled = true;
        resetBtn.textContent = "Отправка...";
        try {
          const { error } = await supabaseClient.auth.resetPasswordForEmail(
            email,
            {
              redirectTo: `${window.location.origin}/profile.html`,
            },
          );
          if (error) throw error;
          showMessage(
            'Ссылка для сброса пароля отправлена на ваш email! Проверьте почту (и папку "Спам").',
            "success",
          );
          emailInput.value = "";
        } catch (err) {
          showMessage("Ошибка: " + err.message, "error");
        } finally {
          resetBtn.disabled = false;
          resetBtn.textContent = "Отправить ссылку";
        }
      }

      function showMessage(text, type) {
        messageBox.textContent = text;
        messageBox.className = `message ${type}`;
        messageBox.style.display = "block";
        setTimeout(() => {
          messageBox.style.display = "none";
        }, 6000);
      }

      resetBtn.addEventListener("click", resetPassword);
      emailInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") resetPassword();
      });
    </script>
  </body>
</html>
