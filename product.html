<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATBUY — Товар</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0a0c10;
        color: #eef2ff;
      }
      .header {
        background: #0f1117;
        border-bottom: 1px solid #1f2329;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px;
      }
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
        flex-wrap: wrap;
        gap: 16px;
      }
      .logo a {
        font-size: 1.8rem;
        font-weight: 800;
        text-decoration: none;
        color: #3b82f6;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 28px;
        flex-wrap: wrap;
      }
      .nav-links a {
        text-decoration: none;
        color: #9ca3af;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: #3b82f6;
      }
      .cart-link {
        background: #3b82f6;
        padding: 6px 14px;
        border-radius: 30px;
        color: #fff !important;
      }
      .youtube-link {
        background: #ff0000;
        color: #fff !important;
        padding: 6px 14px;
        border-radius: 30px;
      }
      .auth-btn {
        background: #3b82f6;
        padding: 8px 22px;
        border-radius: 30px;
        color: #fff;
        font-weight: 600;
        text-decoration: none;
      }
      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #9ca3af;
        cursor: pointer;
      }
      .logout-btn {
        background: 0 0;
        border: 1px solid #3b82f6;
        color: #3b82f6;
        padding: 5px 12px;
        border-radius: 20px;
        cursor: pointer;
      }
      .main {
        padding: 48px 0 64px;
      }
      .product-wrapper {
        display: flex;
        gap: 32px;
        flex-wrap: wrap;
      }
      .product-left {
        flex: 1;
        min-width: 250px;
      }
      .product-right {
        flex: 2;
        min-width: 300px;
      }
      .product-image {
        background: #15181f;
        border-radius: 24px;
        padding: 20px;
        text-align: center;
        margin-bottom: 24px;
      }
      .product-image img {
        max-width: 100%;
        max-height: 400px;
        border-radius: 16px;
      }
      .action-block {
        background: #15181f;
        border-radius: 24px;
        padding: 20px;
        text-align: center;
      }
      .total-price {
        font-size: 1.4rem;
        margin-bottom: 16px;
      }
      .total-price strong {
        color: #fbbf24;
      }
      .btn-add-to-cart {
        background: #3b82f6;
        border: none;
        padding: 12px 32px;
        border-radius: 40px;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        font-size: 1.1rem;
        width: 100%;
        margin-bottom: 12px;
      }
      .back-link {
        display: inline-block;
        color: #3b82f6;
        text-decoration: none;
        margin-top: 8px;
      }
      .product-details {
        background: #15181f;
        border-radius: 24px;
        padding: 20px;
        margin-bottom: 24px;
      }
      .product-name {
        font-size: 2rem;
        margin-bottom: 16px;
      }
      .product-price {
        font-size: 2rem;
        color: #3b82f6;
        margin-bottom: 16px;
      }
      .product-description {
        font-size: 1rem;
        line-height: 1.5;
        color: #cbd5e1;
      }
      .options-section {
        background: #15181f;
        border-radius: 24px;
        padding: 20px;
      }
      .options-section h3 {
        font-size: 1.3rem;
        margin-bottom: 16px;
        color: #3b82f6;
      }
      .option-item {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
        padding: 8px;
        border-radius: 12px;
        background: #1f2329;
        flex-wrap: wrap;
      }
      .option-name {
        flex: 2;
        font-weight: 500;
      }
      .option-price {
        color: #3b82f6;
        font-weight: 600;
      }
      .option-total {
        color: #fbbf24;
        font-weight: 600;
        min-width: 80px;
      }
      .option-quantity {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .option-quantity input {
        width: 60px;
        padding: 6px;
        background: #0f1117;
        border: 1px solid #2d3138;
        border-radius: 8px;
        color: #fff;
        text-align: center;
      }
      .option-quantity button {
        background: #1f2329;
        border: 1px solid #2d3138;
        color: #fff;
        width: 28px;
        height: 28px;
        border-radius: 6px;
        cursor: pointer;
      }
      .footer {
        background: #0f1117;
        border-top: 1px solid #1f2329;
        padding: 30px 0;
        margin-top: 40px;
      }
      .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
      }
      @media (max-width: 768px) {
        .navbar {
          flex-direction: column;
          text-align: center;
        }
        .product-wrapper {
          flex-direction: column;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="navbar">
          <div class="logo"><a href="index.html">ATBUY</a></div>
          <div class="nav-links">
            <a href="reviews.html">Отзывы</a>
            <a href="cart.html" class="cart-link">🛒 Корзина</a>
            <a href="my-orders.html" class="cart-link">📦 Мои заказы</a>
            <a href="support.html" class="cart-link">💬 Поддержка</a>
            <span id="admin-links"></span>
            <a href="https://t.me/your_telegram" target="_blank">Telegram</a>
            <a
              href="https://www.youtube.com/@atr1but"
              target="_blank"
              class="youtube-link"
              >🎬 YouTube</a
            >
            <div id="auth-section"></div>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="container"><div id="productContainer">Загрузка...</div></div>
    </main>
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div>© 2025 ATBUY. Все права защищены.</div>
          <div>
            <a
              href="reviews.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Отзывы</a
            >
            <a
              href="terms.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Оферта</a
            >
            <a
              href="delivery.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Доставка</a
            >
            <a
              href="requisites.html"
              style="color: #9ca3af; text-decoration: none"
              >Реквизиты</a
            >
          </div>
        </div>
      </div>
    </footer>

    <script>
      // ---------- АВТОРИЗАЦИЯ ----------
      let currentUser = null;
      let isAdmin = false;
      function checkAuth() {
        const stored = localStorage.getItem("atbuy_current_user");
        if (stored) {
          const userData = JSON.parse(stored);
          currentUser = {
            email: userData.email,
            user_metadata: { name: userData.name },
          };
          isAdmin = localStorage.getItem("atbuy_is_admin") === "true";
        }
        renderAuthHeader();
      }
      function renderAuthHeader() {
        const authSection = document.getElementById("auth-section");
        const adminLinks = document.getElementById("admin-links");
        if (currentUser) {
          authSection.innerHTML = `<div class="user-info" id="userMenu"><span>👤 ${escapeHtml(currentUser.user_metadata?.name || currentUser.email)}</span><button id="logoutBtn" class="logout-btn">Выйти</button></div>`;
          document.getElementById("userMenu").addEventListener("click", (e) => {
            if (e.target.id !== "logoutBtn")
              window.location.href = "profile.html";
          });
          document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("atbuy_current_user");
            localStorage.removeItem("atbuy_is_admin");
            const supabaseClient = window.supabase.createClient(
              "https://buonqsikukvqbnbpuuco.supabase.co",
              "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw",
            );
            supabaseClient.auth
              .signOut()
              .finally(() => window.location.reload());
          });
          if (adminLinks)
            adminLinks.innerHTML = isAdmin
              ? `<a href="admin-chats.html" class="cart-link">📋 Чаты поддержки</a>`
              : "";
        } else {
          authSection.innerHTML = `<a href="login.html" class="auth-btn">Вход / Регистрация</a>`;
          if (adminLinks) adminLinks.innerHTML = "";
        }
      }
      function escapeHtml(str) {
        return str.replace(
          /[&<>]/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m],
        );
      }

      // ---------- ЗАГРУЗКА ТОВАРА ----------
      let currentProduct = null;
      let productOptions = [];
      let selectedOptionQuantities = {};

      async function loadProduct() {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get("id"));
        if (!productId) {
          document.getElementById("productContainer").innerHTML =
            "<p>Товар не указан</p>";
          return;
        }
        try {
          const response = await fetch("/products.json");
          const allProducts = await response.json();
          currentProduct = allProducts.find((p) => p.id === productId);
          if (!currentProduct) throw new Error("Товар не найден");
          productOptions = currentProduct.options || [];
          // Инициализируем количество опций
          productOptions.forEach((opt) => {
            if (selectedOptionQuantities[opt.id] === undefined)
              selectedOptionQuantities[opt.id] = 0;
          });
          renderProduct();
        } catch (err) {
          console.error(err);
          document.getElementById("productContainer").innerHTML =
            "<p>Товар не найден</p>";
        }
      }

      function renderProduct() {
        const basePrice = parsePrice(currentProduct.price);
        let totalPrice = basePrice;
        for (let id in selectedOptionQuantities) {
          const qty = selectedOptionQuantities[id];
          const opt = productOptions.find((o) => o.id == id);
          if (opt && qty > 0) totalPrice += opt.price * qty;
        }

        document.getElementById("productContainer").innerHTML = `
                <div class="product-wrapper">
                    <div class="product-left">
                        <div class="product-image">${currentProduct.image ? `<img src="${currentProduct.image}" alt="${escapeHtml(currentProduct.name)}">` : '<div style="font-size:4rem;">🖼️</div>'}</div>
                        <div class="action-block">
                            <div class="total-price">Итого: <strong>${totalPrice} ₽</strong></div>
                            <button id="addToCartBtn" class="btn-add-to-cart">Добавить в корзину</button>
                            <div><a href="game.html?id=${currentProduct.game_id}" class="back-link">← Вернуться к товарам игры</a></div>
                        </div>
                    </div>
                    <div class="product-right">
                        <div class="product-details">
                            <div class="product-name">${escapeHtml(currentProduct.name)}</div>
                            <div class="product-price">${escapeHtml(currentProduct.price)}</div>
                            <div class="product-description">${escapeHtml(currentProduct.description || "Описание отсутствует").replace(/\n/g, "<br>")}</div>
                        </div>
                        <div class="options-section">
                            <h3>Дополнительные опции</h3>
                            <div id="optionsList">
                                ${
                                  productOptions.length
                                    ? productOptions
                                        .map((opt) => {
                                          const qty =
                                            selectedOptionQuantities[opt.id] ||
                                            0;
                                          const optionTotal = opt.price * qty;
                                          return `<div class="option-item">
                                        <span class="option-name">${escapeHtml(opt.name)}</span>
                                        <span class="option-price">${opt.price} ₽</span>
                                        <span class="option-total">${optionTotal} ₽</span>
                                        <div class="option-quantity">
                                            <button class="opt-minus" data-id="${opt.id}">-</button>
                                            <input type="number" class="opt-qty-input" data-id="${opt.id}" value="${qty}" min="0" step="1">
                                            <button class="opt-plus" data-id="${opt.id}">+</button>
                                        </div>
                                    </div>`;
                                        })
                                        .join("")
                                    : "<p>Нет опций</p>"
                                }
                            </div>
                        </div>
                    </div>
                </div>
            `;

        // Обработчики опций
        document.querySelectorAll(".opt-plus").forEach((btn) => {
          btn.addEventListener("click", () => {
            const id = parseInt(btn.dataset.id);
            selectedOptionQuantities[id] =
              (selectedOptionQuantities[id] || 0) + 1;
            renderProduct();
          });
        });
        document.querySelectorAll(".opt-minus").forEach((btn) => {
          btn.addEventListener("click", () => {
            const id = parseInt(btn.dataset.id);
            if (selectedOptionQuantities[id] > 0)
              selectedOptionQuantities[id]--;
            renderProduct();
          });
        });
        document.querySelectorAll(".opt-qty-input").forEach((input) => {
          input.addEventListener("change", (e) => {
            const id = parseInt(input.dataset.id);
            let val = parseInt(input.value);
            if (isNaN(val) || val < 0) val = 0;
            selectedOptionQuantities[id] = val;
            renderProduct();
          });
        });

        document
          .getElementById("addToCartBtn")
          .addEventListener("click", () => {
            if (!currentUser) {
              alert("Войдите в аккаунт");
              window.location.href = "login.html";
              return;
            }
            let totalPrice = parsePrice(currentProduct.price);
            let selectedOptionsList = [];
            for (let id in selectedOptionQuantities) {
              const qty = selectedOptionQuantities[id];
              if (qty > 0) {
                const opt = productOptions.find((o) => o.id == id);
                if (opt) {
                  totalPrice += opt.price * qty;
                  selectedOptionsList.push({
                    id: opt.id,
                    name: opt.name,
                    price: opt.price,
                    quantity: qty,
                  });
                }
              }
            }
            let cart = JSON.parse(localStorage.getItem("cart") || "[]");
            cart.push({
              product_id: currentProduct.id,
              product_name: currentProduct.name,
              product_price: totalPrice + " ₽",
              quantity: 1,
              options: selectedOptionsList,
            });
            localStorage.setItem("cart", JSON.stringify(cart));
            alert("Товар добавлен в корзину!");
          });
      }

      function parsePrice(priceStr) {
        return parseInt(priceStr.replace(/[^0-9]/g, "")) || 0;
      }

      // ---------- ЗАПУСК ----------
      window.addEventListener("load", () => {
        checkAuth();
        loadProduct();
      });
    </script>
  </body>
</html>
