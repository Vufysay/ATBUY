<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATBUY — Корзина</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #0a0c10;
        color: #eef2ff;
      }
      .header {
        background: #0f1117;
        border-bottom: 1px solid #1f2329;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 0 24px;
      }
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
        flex-wrap: wrap;
        gap: 16px;
      }
      .logo a {
        font-size: 1.8rem;
        font-weight: 800;
        text-decoration: none;
        color: #3b82f6;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 28px;
        flex-wrap: wrap;
      }
      .nav-links a {
        text-decoration: none;
        color: #9ca3af;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: #3b82f6;
      }
      .cart-link {
        background: #3b82f6;
        padding: 6px 14px;
        border-radius: 30px;
        color: white !important;
      }
      .youtube-link {
        background: #ff0000;
        color: white !important;
        padding: 6px 14px;
        border-radius: 30px;
      }
      .auth-btn {
        background: #3b82f6;
        padding: 8px 22px;
        border-radius: 30px;
        color: white;
        font-weight: 600;
        text-decoration: none;
      }
      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #9ca3af;
        cursor: pointer;
      }
      .logout-btn {
        background: none;
        border: 1px solid #3b82f6;
        color: #3b82f6;
        padding: 5px 12px;
        border-radius: 20px;
        cursor: pointer;
      }
      .main {
        padding: 48px 0 64px;
        min-height: calc(100vh - 200px);
      }
      .cart-header {
        text-align: center;
        margin-bottom: 40px;
      }
      .cart-header h1 {
        font-size: 2.5rem;
        background: linear-gradient(135deg, #fff, #3b82f6);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .cart-items {
        display: flex;
        flex-direction: column;
        gap: 20px;
        margin-bottom: 30px;
      }
      .cart-item {
        background: #15181f;
        border-radius: 20px;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
        border: 1px solid #2d3138;
      }
      .item-info {
        flex: 2;
      }
      .item-name {
        font-size: 1.2rem;
        font-weight: 600;
        margin-bottom: 5px;
      }
      .item-options {
        font-size: 0.8rem;
        color: #9ca3af;
        margin-top: 4px;
      }
      .item-price {
        color: #3b82f6;
        font-weight: 600;
      }
      .item-quantity {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .quantity-btn {
        background: #1f2329;
        border: 1px solid #2d3138;
        color: white;
        width: 30px;
        height: 30px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1.2rem;
      }
      .item-total {
        font-weight: 700;
        min-width: 100px;
        text-align: right;
      }
      .remove-item {
        background: none;
        border: none;
        color: #ef4444;
        cursor: pointer;
        font-size: 1.2rem;
      }
      .cart-summary {
        background: #15181f;
        border-radius: 20px;
        padding: 20px;
        text-align: right;
        border: 1px solid #2d3138;
        margin-bottom: 30px;
      }
      .total-price {
        font-size: 1.5rem;
        font-weight: bold;
      }
      .total-price span {
        color: #3b82f6;
      }
      .checkout-btn {
        background: #3b82f6;
        border: none;
        padding: 12px 28px;
        border-radius: 40px;
        color: white;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        font-size: 1.1rem;
      }
      .contact-form {
        background: #1f2329;
        border-radius: 20px;
        padding: 20px;
        margin-top: 20px;
        display: none;
      }
      .contact-form h3 {
        margin-bottom: 16px;
        color: #3b82f6;
      }
      .input-group {
        margin-bottom: 16px;
      }
      .input-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: 500;
      }
      .input-group input {
        width: 100%;
        padding: 10px 12px;
        background: #0f1117;
        border: 1px solid #2d3138;
        border-radius: 12px;
        color: white;
        font-size: 1rem;
      }
      .form-buttons {
        display: flex;
        gap: 12px;
        margin-top: 20px;
      }
      .btn-primary {
        background: #3b82f6;
        border: none;
        padding: 10px 20px;
        border-radius: 30px;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-secondary {
        background: #4b5563;
        border: none;
        padding: 10px 20px;
        border-radius: 30px;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      .empty-cart {
        text-align: center;
        padding: 60px 20px;
        background: #15181f;
        border-radius: 20px;
      }
      .footer {
        background: #0f1117;
        border-top: 1px solid #1f2329;
        padding: 30px 0;
      }
      .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
      }
      @media (max-width: 768px) {
        .navbar {
          flex-direction: column;
          text-align: center;
        }
        .nav-links {
          justify-content: center;
        }
        .cart-item {
          flex-direction: column;
          text-align: center;
        }
        .item-total {
          text-align: center;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="navbar">
          <div class="logo"><a href="index.html">ATBUY</a></div>
          <div class="nav-links">
            <a href="reviews.html">Отзывы</a>
            <a href="cart.html" class="cart-link">🛒 Корзина</a>
            <a href="my-orders.html" class="cart-link">📦 Мои заказы</a>
            <a href="support.html" class="cart-link">💬 Поддержка</a>
            <span id="admin-links"></span>
            <a href="https://t.me/your_telegram" target="_blank">Telegram</a>
            <a
              href="https://www.youtube.com/@atr1but"
              target="_blank"
              class="youtube-link"
              >🎬 YouTube</a
            >
            <div id="auth-section"></div>
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="container">
        <div class="cart-header">
          <h1>Корзина</h1>
        </div>
        <div id="cart-container"></div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div>© 2025 ATBUY. Все права защищены.</div>
          <div>
            <a
              href="reviews.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Отзывы</a
            >
            <a
              href="terms.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Оферта</a
            >
            <a
              href="delivery.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Доставка</a
            >
            <a
              href="requisites.html"
              style="color: #9ca3af; text-decoration: none"
              >Реквизиты</a
            >
          </div>
        </div>
      </div>
    </footer>

    <script>
      const SUPABASE_URL = "https://buonqsikukvqbnbpuuco.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      let currentUser = null;
      let cartItems = [];

      function parsePrice(priceStr) {
        return parseInt(priceStr.replace(/[^0-9]/g, "")) || 0;
      }

      async function loadCart() {
        if (!currentUser) return;
        const { data, error } = await supabaseClient
          .from("cart")
          .select("*")
          .eq("user_id", currentUser.id);
        if (error) {
          console.error("Ошибка загрузки корзины:", error);
          return;
        }
        cartItems = data || [];
        renderCart();
      }

      function renderCart() {
        const container = document.getElementById("cart-container");
        if (!cartItems.length) {
          container.innerHTML =
            '<div class="empty-cart">🛒 Корзина пуста. Добавьте товары на странице игры.</div>';
          return;
        }

        let html = `<div class="cart-items">`;
        let total = 0;
        cartItems.forEach((item) => {
          const priceNum = parsePrice(item.product_price);
          const itemTotal = priceNum * item.quantity;
          total += itemTotal;
          let optionsHtml = "";
          if (item.options && item.options.length) {
            optionsHtml = `<div class="item-options">Опции: ${item.options.map((opt) => `${opt.name} x${opt.quantity} (+${opt.price * opt.quantity}₽)`).join(", ")}</div>`;
          }
          html += `
                    <div class="cart-item" data-id="${item.id}">
                        <div class="item-info">
                            <div class="item-name">${escapeHtml(item.product_name)}</div>
                            ${optionsHtml}
                            <div class="item-price">${escapeHtml(item.product_price)}</div>
                        </div>
                        <div class="item-quantity">
                            <button class="quantity-btn" data-id="${item.id}" data-delta="-1">-</button>
                            <span>${item.quantity}</span>
                            <button class="quantity-btn" data-id="${item.id}" data-delta="1">+</button>
                        </div>
                        <div class="item-total">${itemTotal} ₽</div>
                        <button class="remove-item" data-id="${item.id}">🗑️</button>
                    </div>
                `;
        });
        html += `</div>
                <div class="cart-summary">
                    <div class="total-price">Итого: <span>${total} ₽</span></div>
                    <button id="checkout-btn" class="checkout-btn">Оформить заказ</button>
                </div>
                <div id="contact-form" class="contact-form">
                    <h3>Контактные данные</h3>
                    <div class="input-group">
                        <label>Номер телефона *</label>
                        <input type="tel" id="phone" placeholder="+7 123 456-78-90" required>
                    </div>
                    <div class="input-group">
                        <label>Telegram (если нет, поставьте прочерк)</label>
                        <input type="text" id="telegram" placeholder="@username или —">
                    </div>
                    <div class="form-buttons">
                        <button id="submit-order-btn" class="btn-primary">Оплатить</button>
                        <button id="cancel-order-btn" class="btn-secondary">Отмена</button>
                    </div>
                </div>
            `;
        container.innerHTML = html;

        // Обработчики изменения количества
        document.querySelectorAll(".quantity-btn").forEach((btn) => {
          btn.addEventListener("click", async (e) => {
            const id = parseInt(btn.dataset.id);
            const delta = parseInt(btn.dataset.delta);
            const item = cartItems.find((i) => i.id === id);
            if (item) {
              const newQuantity = item.quantity + delta;
              if (newQuantity < 1) return;
              const { error } = await supabaseClient
                .from("cart")
                .update({ quantity: newQuantity })
                .eq("id", id);
              if (error) {
                alert("Ошибка обновления количества");
              } else {
                await loadCart();
              }
            }
          });
        });

        // Удаление товара
        document.querySelectorAll(".remove-item").forEach((btn) => {
          btn.addEventListener("click", async (e) => {
            const id = parseInt(btn.dataset.id);
            const { error } = await supabaseClient
              .from("cart")
              .delete()
              .eq("id", id);
            if (error) {
              alert("Ошибка удаления товара");
            } else {
              await loadCart();
            }
          });
        });

        // Оформление заказа
        const checkoutBtn = document.getElementById("checkout-btn");
        if (checkoutBtn) {
          checkoutBtn.addEventListener("click", () => {
            document.getElementById("contact-form").style.display = "block";
            checkoutBtn.style.display = "none";
          });
        }

        const submitBtn = document.getElementById("submit-order-btn");
        if (submitBtn) {
          submitBtn.addEventListener("click", createOrderAndPay);
        }

        const cancelBtn = document.getElementById("cancel-order-btn");
        if (cancelBtn) {
          cancelBtn.addEventListener("click", () => {
            document.getElementById("contact-form").style.display = "none";
            document.getElementById("checkout-btn").style.display = "block";
          });
        }
      }

      async function createOrderAndPay() {
        const phone = document.getElementById("phone").value.trim();
        const telegram =
          document.getElementById("telegram").value.trim() || "—";

        if (!phone) {
          alert("Пожалуйста, укажите номер телефона");
          return;
        }

        const total = cartItems.reduce(
          (sum, item) => sum + parsePrice(item.product_price) * item.quantity,
          0,
        );

        // Сохраняем товары с опциями
        const items = cartItems.map((item) => ({
          product_id: item.product_id,
          product_name: item.product_name,
          product_price: item.product_price,
          quantity: item.quantity,
          options: item.options || [],
        }));

        // Создаём заказ
        const { data: order, error: orderError } = await supabaseClient
          .from("orders")
          .insert({
            user_id: currentUser.id,
            total_amount: total,
            phone: phone,
            telegram: telegram,
            status: "pending",
            items: items,
          })
          .select()
          .single();

        if (orderError) {
          console.error("Ошибка создания заказа:", orderError);
          alert("Ошибка создания заказа: " + orderError.message);
          return;
        }

        // Очищаем корзину
        await supabaseClient
          .from("cart")
          .delete()
          .eq("user_id", currentUser.id);

        // Вызываем Edge Function для создания платежа (если настроена)
        try {
          const response = await fetch(
            `${SUPABASE_URL}/functions/v1/create-payment`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                orderId: order.id,
                amount: total,
                description: `Заказ №${order.id} от ${currentUser.email}`,
                phone: phone,
                telegram: telegram,
                userName: currentUser.user_metadata.name || currentUser.email,
              }),
            },
          );

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errorText}`);
          }

          const { confirmationUrl } = await response.json();
          window.location.href = confirmationUrl;
        } catch (err) {
          console.error("Ошибка создания платежа:", err);
          alert("Ошибка при подключении к платежной системе: " + err.message);
          // Если оплата не настроена, просто очистим корзину и покажем сообщение
          window.location.href = "my-orders.html";
        }
      }

      async function checkAuth() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    const authSection = document.getElementById('auth-section');
    const adminLinks = document.getElementById('admin-links');
    if (session) {
        currentUser = session.user;
        const { data: userAdmin } = await supabaseClient
            .from('users')
            .select('is_admin')
            .eq('id', currentUser.id)
            .single();
        isAdmin = (userAdmin?.is_admin) || (currentUser.email === 'vufysay@gmail.com');
        authSection.innerHTML = `<div class="user-info" id="userMenu"><span>👤 ${escapeHtml(currentUser.user_metadata.name || currentUser.email)}</span><button id="logoutBtn" class="logout-btn">Выйти</button></div>`;
        document.getElementById('userMenu').addEventListener('click', (e) => {
            if (e.target.id !== 'logoutBtn') window.location.href = 'profile.html';
        });
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.stopPropagation();
            await supabaseClient.auth.signOut();
            window.location.reload();
        });
        if (adminLinks) adminLinks.innerHTML = isAdmin ? `<a href="admin-chats.html" class="cart-link">📋 Чаты поддержки</a>` : '';
        await loadCart();
    } else {
        authSection.innerHTML = `<a href="login.html" class="auth-btn">Вход / Регистрация</a>`;
        document.getElementById('cart-container').innerHTML = '<div class="empty-cart">🔒 Войдите, чтобы увидеть корзину</div>';
        if (adminLinks) adminLinks.innerHTML = '';
    }
}

      function escapeHtml(str) {
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      // Инициализация
      window.addEventListener("load", async () => {
        await checkAuth();
      });
    </script>
  </body>
</html>
