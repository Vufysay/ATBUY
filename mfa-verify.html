<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Подтверждение 2FA — ATBUY</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Ваши стили, похожие на страницу входа */
      .auth-container {
        max-width: 400px;
        margin: 50px auto;
        background: #15181f;
        padding: 30px;
        border-radius: 24px;
      }
      .input-group {
        margin-bottom: 20px;
      }
      .input-group input {
        width: 100%;
        padding: 10px;
        background: #1f2329;
        border: 1px solid #2d3138;
        border-radius: 12px;
        color: #fff;
      }
      .action-btn {
        width: 100%;
        padding: 10px;
        background: #3b82f6;
        border: none;
        border-radius: 30px;
        color: #fff;
        cursor: pointer;
      }
      .message {
        margin-top: 10px;
        padding: 8px;
        border-radius: 8px;
      }
      .error {
        background: #ef444433;
        color: #ef4444;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="auth-container">
      <h2>Подтверждение двухфакторной аутентификации</h2>
      <p>Введите код из приложения-аутентификатора</p>
      <div class="input-group">
        <input type="text" id="mfa-code" placeholder="6-значный код" />
      </div>
      <button id="verify-mfa-btn" class="action-btn">Подтвердить</button>
      <div id="message" class="message" style="display: none"></div>
    </div>

    <script>
      const SUPABASE_URL = "https://buonqsikukvqbnbpuuco.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      document
        .getElementById("verify-mfa-btn")
        .addEventListener("click", async () => {
          const code = document.getElementById("mfa-code").value.trim();
          const messageDiv = document.getElementById("message");
          if (!code || code.length !== 6) {
            messageDiv.textContent = "Введите 6-значный код";
            messageDiv.className = "message error";
            messageDiv.style.display = "block";
            return;
          }

          const { data: factors, error: listError } =
            await supabaseClient.auth.mfa.listFactors();
          if (listError || !factors.totp || factors.totp.length === 0) {
            messageDiv.textContent = "Ошибка: не найден активный фактор 2FA";
            messageDiv.className = "message error";
            messageDiv.style.display = "block";
            return;
          }

          const factorId = factors.totp[0].id;
          const { error: verifyError } = await supabaseClient.auth.mfa.verify({
            factorId: factorId,
            code: code,
          });

          if (verifyError) {
            messageDiv.textContent = "Неверный код. Попробуйте ещё раз.";
            messageDiv.className = "message error";
            messageDiv.style.display = "block";
            return;
          }

          // Успешное подтверждение
          messageDiv.textContent = "Подтверждение пройдено! Перенаправление...";
          messageDiv.className = "message success";
          messageDiv.style.display = "block";
          setTimeout(() => {
            window.location.href = "index.html";
          }, 1000);
        });
    </script>
  </body>
</html>
