<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мои заказы — ATBUY</title>
    <style>
      /* стили как в предыдущей версии */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0a0c10;
        color: #eef2ff;
      }
      .header {
        background: #0f1117;
        border-bottom: 1px solid #1f2329;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 0 24px;
      }
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
        flex-wrap: wrap;
        gap: 16px;
      }
      .logo a {
        font-size: 1.8rem;
        font-weight: 800;
        text-decoration: none;
        color: #3b82f6;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 28px;
        flex-wrap: wrap;
      }
      .nav-links a {
        text-decoration: none;
        color: #9ca3af;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: #3b82f6;
      }
      .cart-link {
        background: #3b82f6;
        padding: 6px 14px;
        border-radius: 30px;
        color: #fff !important;
      }
      .youtube-link {
        background: #ff0000;
        color: #fff !important;
        padding: 6px 14px;
        border-radius: 30px;
      }
      .auth-btn {
        background: #3b82f6;
        padding: 8px 22px;
        border-radius: 30px;
        color: #fff;
        font-weight: 600;
        text-decoration: none;
      }
      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #9ca3af;
        cursor: pointer;
      }
      .logout-btn {
        background: 0 0;
        border: 1px solid #3b82f6;
        color: #3b82f6;
        padding: 5px 12px;
        border-radius: 20px;
        cursor: pointer;
      }
      .main {
        padding: 48px 0 64px;
      }
      .orders-header {
        text-align: center;
        margin-bottom: 40px;
      }
      .orders-header h1 {
        font-size: 2.5rem;
        background: linear-gradient(135deg, #fff, #3b82f6);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .filter-tabs {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-bottom: 32px;
      }
      .filter-tab {
        background: #1f2329;
        border: none;
        padding: 8px 20px;
        border-radius: 30px;
        color: #fff;
        cursor: pointer;
      }
      .filter-tab.active {
        background: #3b82f6;
      }
      .orders-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 24px;
      }
      .order-card {
        background: #15181f;
        border-radius: 20px;
        padding: 20px;
        border: 1px solid #2d3138;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .order-card:hover {
        transform: translateY(-4px);
        border-color: #3b82f6;
      }
      .order-id {
        font-size: 0.8rem;
        color: #9ca3af;
        margin-bottom: 8px;
      }
      .order-status {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        margin-bottom: 12px;
      }
      .status-pending {
        background: #f59e0b33;
        color: #fbbf24;
      }
      .status-paid {
        background: #3b82f633;
        color: #3b82f6;
      }
      .status-completed {
        background: #22c55e33;
        color: #22c55e;
      }
      .order-total {
        font-size: 1.2rem;
        font-weight: bold;
        color: #3b82f6;
        margin-top: 8px;
      }
      .order-date {
        font-size: 0.7rem;
        color: #6b7280;
        margin-top: 8px;
      }
      .pay-now-btn {
        background: #f59e0b;
        border: none;
        padding: 6px 12px;
        border-radius: 20px;
        color: #fff;
        cursor: pointer;
        margin-top: 8px;
        width: 100%;
      }
      .empty-orders {
        text-align: center;
        padding: 60px;
        background: #15181f;
        border-radius: 20px;
      }
      .footer {
        background: #0f1117;
        border-top: 1px solid #1f2329;
        padding: 30px 0;
      }
      .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
      }
      @media (max-width: 768px) {
        .navbar {
          flex-direction: column;
          text-align: center;
        }
        .orders-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="navbar">
          <div class="logo"><a href="index.html">ATBUY</a></div>
          <div class="nav-links">
            <a href="reviews.html">Отзывы</a
            ><a href="cart.html" class="cart-link">🛒 Корзина</a
            ><a href="my-orders.html" class="cart-link">📦 Мои заказы</a
            ><a href="support.html" class="cart-link">💬 Поддержка</a
            ><span id="admin-links"></span
            ><a href="https://t.me/your_telegram" target="_blank">Telegram</a
            ><a
              href="https://www.youtube.com/@atr1but"
              target="_blank"
              class="youtube-link"
              >🎬 YouTube</a
            >
            <div id="auth-section"></div>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="container">
        <div class="orders-header"><h1>Мои заказы</h1></div>
        <div class="filter-tabs">
          <button class="filter-tab active" data-status="all">Все</button
          ><button class="filter-tab" data-status="pending">
            Ожидают оплаты</button
          ><button class="filter-tab" data-status="paid">Оплачены</button
          ><button class="filter-tab" data-status="completed">Выполнены</button>
        </div>
        <div id="ordersContainer" class="orders-grid"></div>
      </div>
    </main>
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div>© 2025 ATBUY. Все права защищены.</div>
          <div>
            <a
              href="reviews.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Отзывы</a
            ><a
              href="terms.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Оферта</a
            ><a
              href="delivery.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Доставка</a
            ><a
              href="requisites.html"
              style="color: #9ca3af; text-decoration: none"
              >Реквизиты</a
            >
          </div>
        </div>
      </div>
    </footer>
    <script>
      const SUPABASE_URL = "https://buonqsikukvqbnbpuuco.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );
      let currentUser = null,
        isAdmin = false,
        currentStatus = "all";

      async function loadOrders() {
        if (!currentUser) return;
        let query = supabaseClient.from("orders").select("*");
        if (!isAdmin) query = query.eq("user_id", currentUser.id);
        const { data, error } = await query.order("created_at", {
          ascending: false,
        });
        if (error) {
          console.error(error);
          return;
        }
        let filtered = data;
        if (currentStatus !== "all")
          filtered = data.filter((o) => o.status === currentStatus);
        renderOrders(filtered);
      }
      function renderOrders(orders) {
        const container = document.getElementById("ordersContainer");
        if (!orders.length) {
          container.innerHTML =
            '<div class="empty-orders">📭 У вас пока нет заказов</div>';
          return;
        }
        container.innerHTML = orders
          .map(
            (order) => `
                <div class="order-card" data-order-id="${order.id}">
                    <div class="order-id">Заказ #${order.id}</div>
                    <div class="order-status status-${order.status === "pending" ? "pending" : order.status === "paid" ? "paid" : "completed"}">${order.status === "pending" ? "⏳ Ожидает оплаты" : order.status === "paid" ? "✅ Оплачен" : "🎉 Выполнен"}</div>
                    <div class="order-total">${order.total_amount} ₽</div>
                    <div class="order-date">${new Date(order.created_at).toLocaleDateString()}</div>
                    ${order.status === "pending" ? `<button class="pay-now-btn" data-order-id="${order.id}" data-order-amount="${order.total_amount}">💳 Оплатить сейчас</button>` : ""}
                </div>
            `,
          )
          .join("");
        document.querySelectorAll(".pay-now-btn").forEach((btn) => {
          btn.addEventListener("click", async (e) => {
            e.stopPropagation();
            const orderId = parseInt(btn.dataset.orderId);
            const amount = parseInt(btn.dataset.orderAmount);
            await repeatPayment(orderId, amount);
          });
        });
        document.querySelectorAll(".order-card").forEach((card) => {
          card.addEventListener("click", (e) => {
            if (e.target.classList.contains("pay-now-btn")) return;
            window.location.href = `order-details.html?id=${card.dataset.orderId}`;
          });
        });
      }
      async function repeatPayment(orderId, amount) {
        if (!currentUser) return;
        try {
          const response = await fetch(
            `${SUPABASE_URL}/functions/v1/create-payment`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                orderId: orderId,
                amount: amount,
                description: `Заказ №${orderId} от ${currentUser.email}`,
                phone: "",
                telegram: "",
                userName: currentUser.user_metadata.name || currentUser.email,
              }),
            },
          );
          if (!response.ok) throw new Error("Ошибка создания платежа");
          const { confirmationUrl } = await response.json();
          window.location.href = confirmationUrl;
        } catch (err) {
          alert("Ошибка: " + err.message);
        }
      }
      async function checkAuth() {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();
        const authSection = document.getElementById("auth-section");
        const adminLinks = document.getElementById("admin-links");
        if (session) {
          const aal = session.user?.factors?.aal || "aal1";
          const { data: userData } = await supabaseClient
            .from("users")
            .select("is_2fa_enabled")
            .eq("id", session.user.id)
            .single();
          if (userData?.is_2fa_enabled && aal !== "aal2") {
            window.location.href = "mfa-verify.html";
            return;
          }
          currentUser = session.user;
          const { data: userData2 } = await supabaseClient
            .from("users")
            .select("is_admin")
            .eq("id", currentUser.id)
            .single();
          isAdmin =
            userData2?.is_admin || currentUser.email === "vufysay@gmail.com";
          authSection.innerHTML = `<div class="user-info" id="userMenu"><span>👤 ${escapeHtml(currentUser.user_metadata.name || currentUser.email)}</span><button id="logoutBtn" class="logout-btn">Выйти</button></div>`;
          document.getElementById("userMenu").addEventListener("click", (e) => {
            if (e.target.id !== "logoutBtn")
              window.location.href = "profile.html";
          });
          document
            .getElementById("logoutBtn")
            .addEventListener("click", async (e) => {
              e.stopPropagation();
              await supabaseClient.auth.signOut();
              window.location.reload();
            });
          if (adminLinks) {
            adminLinks.innerHTML = isAdmin
              ? `<a href="admin-chats.html" class="cart-link">📋 Чаты поддержки</a>`
              : "";
          }
          await loadOrders();
        } else {
          authSection.innerHTML = `<a href="login.html" class="auth-btn">Вход / Регистрация</a>`;
          document.getElementById("ordersContainer").innerHTML =
            '<div class="empty-orders">🔒 Войдите, чтобы увидеть заказы</div>';
          if (adminLinks) adminLinks.innerHTML = "";
        }
      }
      function escapeHtml(str) {
        return str.replace(
          /[&<>]/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m],
        );
      }
      window.addEventListener("load", async () => {
        await checkAuth();
        document.querySelectorAll(".filter-tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            document
              .querySelectorAll(".filter-tab")
              .forEach((t) => t.classList.remove("active"));
            tab.classList.add("active");
            currentStatus = tab.dataset.status;
            loadOrders();
          });
        });
      });
    </script>
  </body>
</html>
