<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATBUY — Отзывы</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0a0c10;
        color: #eef2ff;
      }
      .header {
        background: #0f1117;
        border-bottom: 1px solid #1f2329;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 0 24px;
      }
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
        flex-wrap: wrap;
        gap: 16px;
      }
      .logo a {
        font-size: 1.8rem;
        font-weight: 800;
        text-decoration: none;
        color: #3b82f6;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 28px;
        flex-wrap: wrap;
      }
      .nav-links a {
        text-decoration: none;
        color: #9ca3af;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: #3b82f6;
      }
      .youtube-link {
        background: #ff0000;
        color: #fff !important;
        padding: 6px 14px;
        border-radius: 30px;
      }
      .auth-btn {
        background: #3b82f6;
        padding: 8px 22px;
        border-radius: 30px;
        color: #fff;
        font-weight: 600;
        text-decoration: none;
      }
      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #9ca3af;
        cursor: pointer;
      }
      .logout-btn {
        background: 0 0;
        border: 1px solid #3b82f6;
        color: #3b82f6;
        padding: 5px 12px;
        border-radius: 20px;
        cursor: pointer;
      }
      .main {
        padding: 48px 0 64px;
      }
      .reviews-header {
        text-align: center;
        margin-bottom: 40px;
      }
      .reviews-header h1 {
        font-size: 2.5rem;
        background: linear-gradient(135deg, #fff, #3b82f6);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .average-rating {
        background: #15181f;
        border-radius: 30px;
        padding: 20px;
        text-align: center;
        max-width: 300px;
        margin: 0 auto 40px;
        border: 1px solid #2d3138;
      }
      .average-rating .stars {
        font-size: 2rem;
        letter-spacing: 4px;
        color: #fbbf24;
      }
      .average-rating .value {
        font-size: 1.8rem;
        font-weight: 700;
        margin: 8px 0;
      }
      .review-form {
        background: #15181f;
        border-radius: 24px;
        padding: 28px;
        margin-bottom: 48px;
        border: 1px solid #2d3138;
      }
      .review-form h3 {
        margin-bottom: 20px;
        font-size: 1.4rem;
      }
      .rating-input {
        margin-bottom: 20px;
      }
      .rating-input label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
      }
      .stars-input {
        display: flex;
        gap: 8px;
        font-size: 2rem;
        cursor: pointer;
      }
      .stars-input span {
        cursor: pointer;
        color: #4b5563;
        transition: color 0.1s;
      }
      .stars-input span.active,
      .stars-input span:hover {
        color: #fbbf24;
      }
      .review-form textarea {
        width: 100%;
        padding: 12px;
        background: #1f2329;
        border: 1px solid #2d3138;
        border-radius: 16px;
        color: #fff;
        font-size: 1rem;
        resize: vertical;
        margin-bottom: 20px;
      }
      .review-form button {
        background: #3b82f6;
        border: none;
        padding: 12px 28px;
        border-radius: 40px;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      .reviews-list {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .review-card {
        background: #15181f;
        border-radius: 20px;
        padding: 20px;
        border: 1px solid #2d3138;
        position: relative;
      }
      .review-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        flex-wrap: wrap;
        gap: 10px;
      }
      .review-author {
        font-weight: 600;
        color: #3b82f6;
      }
      .review-stars {
        color: #fbbf24;
        font-size: 1.2rem;
        letter-spacing: 2px;
      }
      .review-date {
        font-size: 0.8rem;
        color: #9ca3af;
      }
      .review-comment {
        line-height: 1.4;
        margin-top: 8px;
      }
      .admin-review-controls {
        position: absolute;
        top: 16px;
        right: 16px;
        display: flex;
        gap: 8px;
        z-index: 2;
      }
      .admin-review-controls button {
        background: #0009;
        backdrop-filter: blur(4px);
        border-radius: 20px;
        padding: 4px 10px;
        font-size: 0.8rem;
        cursor: pointer;
        color: #fff;
        border: none;
      }
      .admin-review-controls .edit-btn:hover {
        background: #3b82f6;
      }
      .admin-review-controls .delete-btn:hover {
        background: #dc2626;
      }
      .no-reviews {
        text-align: center;
        padding: 40px;
        color: #9ca3af;
      }
      .footer {
        background: #0f1117;
        border-top: 1px solid #1f2329;
        padding: 40px 0;
      }
      .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
      }
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000c;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .modal.active {
        display: flex;
      }
      .modal-content {
        background: #15181f;
        border-radius: 24px;
        padding: 28px;
        width: 90%;
        max-width: 450px;
      }
      .modal-content textarea {
        width: 100%;
        padding: 12px;
        margin-bottom: 16px;
        background: #1f2329;
        border: 1px solid #2d3138;
        border-radius: 12px;
        color: #fff;
      }
      .modal-content .stars-input {
        margin-bottom: 16px;
      }
      .modal-content button {
        background: #3b82f6;
        border: 0;
        padding: 8px 16px;
        border-radius: 30px;
        color: #fff;
        cursor: pointer;
        margin-right: 12px;
      }
      @media (max-width: 768px) {
        .navbar {
          flex-direction: column;
          text-align: center;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="navbar">
          <div class="logo"><a href="index.html">ATBUY</a></div>
          <div class="nav-links">
            <a href="reviews.html">Отзывы</a>
            <a href="cart.html" class="cart-link">🛒 Корзина</a>
            <a href="my-orders.html" class="cart-link">📦 Мои заказы</a>
            <a href="support.html" class="cart-link">💬 Поддержка</a>
            <span id="admin-links"></span>
            <a href="https://t.me/your_telegram" target="_blank">Telegram</a>
            <a
              href="https://www.youtube.com/@atr1but"
              target="_blank"
              class="youtube-link"
              >🎬 YouTube</a
            >
            <div id="auth-section"></div>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="container">
        <div class="reviews-header"><h1>Отзывы наших клиентов</h1></div>
        <div id="averageContainer" class="average-rating">
          <div class="stars">★★★★★</div>
          <div class="value">Загрузка...</div>
          <div>средняя оценка</div>
        </div>
        <div id="reviewFormContainer"></div>
        <div id="reviewsList" class="reviews-list">
          <div class="no-reviews">Загрузка отзывов...</div>
        </div>
      </div>
    </main>
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div>© 2025 ATBUY. Все права защищены.</div>
          <div>
            <a
              href="reviews.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Отзывы</a
            >
            <a
              href="terms.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Оферта</a
            >
            <a
              href="delivery.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Доставка</a
            >
            <a
              href="requisites.html"
              style="color: #9ca3af; text-decoration: none"
              >Реквизиты</a
            >
          </div>
        </div>
      </div>
    </footer>
    <div id="editModal" class="modal">
      <div class="modal-content">
        <h3>Редактировать отзыв</h3>
        <div class="rating-input">
          <label>Оценка:</label>
          <div class="stars-input" id="editStarsInput">
            <span data-rating="1">★</span><span data-rating="2">★</span>
            <span data-rating="3">★</span><span data-rating="4">★</span>
            <span data-rating="5">★</span>
          </div>
        </div>
        <textarea
          id="editComment"
          rows="4"
          placeholder="Текст отзыва"
        ></textarea>
        <div style="display: flex; justify-content: flex-end">
          <button id="saveEditBtn">Сохранить</button>
          <button id="cancelEditBtn" style="background: #4b5563">Отмена</button>
        </div>
      </div>
    </div>
    <script>
      const SUPABASE_URL = "https://buonqsikukvqbnbpuuco.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw";
      let supabaseClient = null;
      let currentUser = null,
        isAdmin = false,
        selectedRating = 0,
        editingReviewId = null,
        editingCurrentRating = 0,
        existingReview = null;

      function checkAuth() {
        const stored = localStorage.getItem("atbuy_current_user");
        if (stored) {
          const userData = JSON.parse(stored);
          currentUser = {
            email: userData.email,
            user_metadata: { name: userData.name },
          };
          isAdmin = localStorage.getItem("atbuy_is_admin") === "true";
        }
        renderAuthHeader();
        renderReviewForm();
        loadReviews();
      }

      function renderAuthHeader() {
        const authSection = document.getElementById("auth-section");
        const adminLinks = document.getElementById("admin-links");
        if (currentUser) {
          authSection.innerHTML = `<div class="user-info" id="userMenu"><span>👤 ${escapeHtml(currentUser.user_metadata?.name || currentUser.email)}</span><button id="logoutBtn" class="logout-btn">Выйти</button></div>`;
          document.getElementById("userMenu").addEventListener("click", (e) => {
            if (e.target.id !== "logoutBtn")
              window.location.href = "profile.html";
          });
          document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("atbuy_current_user");
            localStorage.removeItem("atbuy_is_admin");
            supabaseClient =
              supabaseClient ||
              window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            supabaseClient.auth
              .signOut()
              .finally(() => window.location.reload());
          });
          if (adminLinks)
            adminLinks.innerHTML = isAdmin
              ? `<a href="admin-chats.html" class="cart-link">📋 Чаты поддержки</a>`
              : "";
        } else {
          authSection.innerHTML = `<a href="login.html" class="auth-btn">Вход / Регистрация</a>`;
          if (adminLinks) adminLinks.innerHTML = "";
        }
      }

      function escapeHtml(str) {
        return str.replace(
          /[&<>]/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m],
        );
      }

      // ... (остальные функции как в предыдущем полном reviews.html — loadReviews, displayReviews, calculateAverage, renderReviewForm, openEditModal, saveEdit, deleteReview, loadExistingReview)
      // Я их здесь опускаю для краткости, но в реальном файле они должны быть. Вы можете скопировать их из последней рабочей версии reviews.html, которую я давал ранее.
      // Главное — замените checkAuth на версию выше, а в renderReviewForm добавьте создание supabaseClient при необходимости.
    </script>
  </body>
</html>
