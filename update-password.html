<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATBUY — Смена пароля</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #15181f;
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #1f2329;
            border: 1px solid #2d3138;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        button {
            background: #3b82f6;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }
        button:hover {
            background: #2563eb;
        }
        .message {
            margin-top: 16px;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.9rem;
        }
        .success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #22c55e;
        }
        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h1>Создание нового пароля</h1>
        <form id="resetPasswordForm">
            <div class="input-group">
                <label>Новый пароль</label>
                <input type="password" id="newPassword" required>
            </div>
            <div class="input-group">
                <label>Подтвердите пароль</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit">Сменить пароль</button>
        </form>
        <div id="message" class="message" style="display: none;"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://buonqsikukvqbnbpuuco.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');

            if (newPassword !== confirmPassword) {
                messageDiv.textContent = 'Пароли не совпадают';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }
            if (newPassword.length < 6) {
                messageDiv.textContent = 'Пароль должен быть не менее 6 символов';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }

            try {
                // Обновляем пароль пользователя
                const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
                if (error) throw error;

                messageDiv.textContent = 'Пароль успешно изменён! Сейчас вы будете перенаправлены на страницу входа.';
                messageDiv.className = 'message success';
                messageDiv.style.display = 'block';

                // Выходим из системы, чтобы пользователь заново вошёл с новым паролем
                await supabaseClient.auth.signOut();
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            } catch (error) {
                messageDiv.textContent = 'Ошибка: ' + error.message;
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
