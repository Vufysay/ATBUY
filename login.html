<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATBUY — Вход и регистрация</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .auth-container {
        background: #fff;
        border-radius: 24px;
        box-shadow: 0 20px 40px #0003;
        width: 100%;
        max-width: 460px;
        overflow: hidden;
      }
      .tabs {
        display: flex;
        background: #f8f9fa;
        border-bottom: 1px solid #e9ecef;
      }
      .tab-btn {
        flex: 1;
        background: 0 0;
        border: none;
        padding: 18px 0;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        color: #6c757d;
      }
      .tab-btn.active {
        color: #4f46e5;
        background: #fff;
        border-bottom: 3px solid #4f46e5;
      }
      .form-panel {
        display: none;
        padding: 32px 28px 36px;
        animation: fadeIn 0.3s;
      }
      .form-panel.active {
        display: block;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      h2 {
        font-size: 1.8rem;
        margin-bottom: 24px;
        color: #1f2937;
        text-align: center;
      }
      .input-group {
        margin-bottom: 20px;
      }
      .input-group label {
        display: block;
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 6px;
        color: #374151;
      }
      .input-group input {
        width: 100%;
        padding: 12px 16px;
        font-size: 1rem;
        border: 1.5px solid #e2e8f0;
        border-radius: 16px;
        transition: 0.2s;
        outline: 0;
      }
      .input-group input:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px #4f46e533;
      }
      .action-btn {
        width: 100%;
        background: linear-gradient(105deg, #4f46e5, #7c3aed);
        border: none;
        padding: 14px;
        border-radius: 40px;
        color: #fff;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        margin-top: 12px;
      }
      .action-btn:hover {
        background: linear-gradient(105deg, #4338ca, #6d28d9);
      }
      .demo-note {
        text-align: center;
        margin-top: 24px;
        font-size: 0.75rem;
        color: #6b7280;
        border-top: 1px solid #e5e7eb;
        padding-top: 20px;
      }
      .toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #1f2937;
        color: #fff;
        padding: 12px 24px;
        border-radius: 40px;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 1000;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .forgot-link {
        text-align: center;
        margin-top: 16px;
      }
      .forgot-link a {
        color: #4f46e5;
        text-decoration: none;
        font-size: 0.9rem;
      }
      .resend-link {
        margin-top: 12px;
        text-align: center;
      }
      .resend-link a {
        color: #4f46e5;
        cursor: pointer;
        text-decoration: none;
        font-size: 0.85rem;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
    <script>
      (function () {
        emailjs.init("YIKBw4TxPT9yO7aCd");
      })();
    </script>
  </head>
  <body>
    <div class="auth-container">
      <div class="tabs">
        <button class="tab-btn active" data-tab="login">Вход</button>
        <button class="tab-btn" data-tab="register">Регистрация</button>
      </div>

      <div class="form-panel active" id="login-panel">
        <h2>Вход</h2>
        <form id="login-form">
          <div class="input-group">
            <label>Электронная почта</label>
            <input
              type="email"
              id="login-email"
              placeholder="example@mail.ru"
              required
            />
          </div>
          <div class="input-group">
            <label>Пароль</label>
            <input
              type="password"
              id="login-password"
              placeholder="••••••••"
              required
            />
          </div>
          <button type="submit" class="action-btn">Войти</button>
          <div class="forgot-link">
            <a href="#" id="forgotPasswordLink">Забыли пароль?</a>
          </div>
        </form>
        <div class="demo-note">
          После регистрации подтвердите email — письмо придёт на почту.
        </div>
      </div>

      <div class="form-panel" id="register-panel">
        <h2>Создать аккаунт</h2>
        <form id="register-form">
          <div class="input-group">
            <label>Имя пользователя</label
            ><input type="text" id="reg-name" placeholder="Алексей" />
          </div>
          <div class="input-group">
            <label>Электронная почта</label
            ><input type="email" id="reg-email" placeholder="hello@site.com" />
          </div>
          <div class="input-group">
            <label>Пароль</label
            ><input
              type="password"
              id="reg-password"
              placeholder="минимум 6 символов"
            />
          </div>
          <div class="input-group">
            <label>Подтвердите пароль</label
            ><input
              type="password"
              id="reg-password-confirm"
              placeholder="повторите пароль"
            />
          </div>
          <button type="submit" class="action-btn">Зарегистрироваться</button>
        </form>
        <div class="demo-note">
          После регистрации на почту придёт ссылка для подтверждения.
        </div>
      </div>

      <div class="form-panel" id="code-panel" style="display: none">
        <h2>Подтверждение двухфакторной аутентификации</h2>
        <form id="code-form">
          <div class="input-group">
            <label>Код из письма</label
            ><input
              type="text"
              id="verification-code"
              placeholder="6-значный код"
              autocomplete="off"
            />
          </div>
          <button type="submit" class="action-btn">Подтвердить</button>
          <div class="resend-link">
            <a href="#" id="resend-code-link">Отправить код повторно</a>
          </div>
        </form>
        <div class="demo-note">Код действителен 10 минут.</div>
      </div>
    </div>
    <div id="toast-message" class="toast"></div>

    <script>
      const SUPABASE_URL = "https://buonqsikukvqbnbpuuco.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      let currentUser = null;

      function showToast(message, isError = false) {
        const toast = document.getElementById("toast-message");
        toast.textContent = message;
        toast.classList.add("show");
        if (isError) toast.style.backgroundColor = "#dc2626e6";
        else toast.style.backgroundColor = "#1f2937e6";
        setTimeout(() => toast.classList.remove("show"), 3000);
      }

      function switchTab(tabId) {
        const btns = document.querySelectorAll(".tab-btn");
        btns.forEach((btn) =>
          btn.classList.toggle("active", btn.dataset.tab === tabId),
        );
        document.getElementById("login-panel").style.display =
          tabId === "login" ? "block" : "none";
        document.getElementById("register-panel").style.display =
          tabId === "register" ? "block" : "none";
        document.getElementById("code-panel").style.display = "none";
      }
      document
        .querySelectorAll(".tab-btn")
        .forEach((btn) =>
          btn.addEventListener("click", () => switchTab(btn.dataset.tab)),
        );

      // Регистрация
      document
        .getElementById("register-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const name = document.getElementById("reg-name").value.trim();
          const email = document.getElementById("reg-email").value.trim();
          const password = document.getElementById("reg-password").value;
          const confirm = document.getElementById("reg-password-confirm").value;
          if (!name || name.length < 2) {
            showToast("Имя не менее 2 символов", true);
            return;
          }
          if (!email.includes("@")) {
            showToast("Введите корректный email", true);
            return;
          }
          if (password.length < 6) {
            showToast("Пароль не менее 6 символов", true);
            return;
          }
          if (password !== confirm) {
            showToast("Пароли не совпадают", true);
            return;
          }
          const { error } = await supabaseClient.auth.signUp({
            email,
            password,
            options: { data: { name } },
          });
          if (error) {
            showToast(error.message, true);
            return;
          }
          showToast("Письмо с подтверждением отправлено!");
          setTimeout(() => switchTab("login"), 2000);
          document.getElementById("register-form").reset();
        });

      // Отправка кода 2FA через EmailJS
      async function sendVerificationCode(email, userId) {
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        const expiresAt = new Date(Date.now() + 10 * 60 * 1000).toISOString();
        await supabaseClient.from("email_verification_codes").insert({
          user_id: userId,
          code: code,
          expires_at: expiresAt,
        });
        const serviceId = "service_9od2h3e";
        const templateId = "template_2fa"; // создайте новый шаблон в EmailJS
        await emailjs.send(serviceId, templateId, {
          to_email: email,
          code: code,
        });
        return code;
      }

      // Вход
      document
        .getElementById("login-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("login-email").value.trim();
          const password = document.getElementById("login-password").value;
          if (!email || !password) {
            showToast("Заполните все поля", true);
            return;
          }
          const { data, error } = await supabaseClient.auth.signInWithPassword({
            email,
            password,
          });
          if (error) {
            showToast("Неверный email или пароль", true);
            return;
          }
          currentUser = data.user;
          // Проверяем, включена ли 2FA
          const { data: userData } = await supabaseClient
            .from("users")
            .select("is_2fa_enabled")
            .eq("id", currentUser.id)
            .single();
          if (userData?.is_2fa_enabled) {
            await sendVerificationCode(email, currentUser.id);
            showToast("Код подтверждения отправлен на почту!");
            document.getElementById("login-panel").style.display = "none";
            document.getElementById("code-panel").style.display = "block";
          } else {
            localStorage.setItem(
              "atbuy_current_user",
              JSON.stringify({
                email: currentUser.email,
                name: currentUser.user_metadata.name,
              }),
            );
            window.location.href = "index.html";
          }
        });

      // Проверка кода 2FA
      document
        .getElementById("code-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const code = document
            .getElementById("verification-code")
            .value.trim();
          if (!code || code.length !== 6) {
            showToast("Введите 6-значный код", true);
            return;
          }
          const { data, error } = await supabaseClient
            .from("email_verification_codes")
            .select("*")
            .eq("user_id", currentUser.id)
            .eq("code", code)
            .gt("expires_at", new Date().toISOString())
            .order("created_at", { ascending: false })
            .limit(1);
          if (error || !data || data.length === 0) {
            showToast("Неверный или просроченный код", true);
            return;
          }
          await supabaseClient
            .from("email_verification_codes")
            .delete()
            .eq("id", data[0].id);
          localStorage.setItem(
            "atbuy_current_user",
            JSON.stringify({
              email: currentUser.email,
              name: currentUser.user_metadata.name,
            }),
          );
          window.location.href = "index.html";
        });

      // Повторная отправка кода
      document
        .getElementById("resend-code-link")
        .addEventListener("click", async (e) => {
          e.preventDefault();
          if (!currentUser) return;
          await sendVerificationCode(currentUser.email, currentUser.id);
          showToast("Новый код отправлен!");
          document.getElementById("verification-code").value = "";
          document.getElementById("verification-code").focus();
        });

      // Восстановление пароля
      document
        .getElementById("forgotPasswordLink")
        .addEventListener("click", (e) => {
          e.preventDefault();
          window.location.href = "reset-password.html";
        });
    </script>
  </body>
</html>
