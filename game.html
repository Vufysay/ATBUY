<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATBUY — Товары игры</title>
    <style>
      /* стили как в предыдущей версии (они уже есть) */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0a0c10;
        color: #eef2ff;
      }
      .header {
        background: #0f1117;
        border-bottom: 1px solid #1f2329;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 0 24px;
      }
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
        flex-wrap: wrap;
        gap: 16px;
      }
      .logo a {
        font-size: 1.8rem;
        font-weight: 800;
        text-decoration: none;
        color: #3b82f6;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 28px;
        flex-wrap: wrap;
      }
      .nav-links a {
        text-decoration: none;
        color: #9ca3af;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: #3b82f6;
      }
      .cart-link {
        background: #3b82f6;
        padding: 6px 14px;
        border-radius: 30px;
        color: #fff !important;
      }
      .youtube-link {
        background: #ff0000;
        color: #fff !important;
        padding: 6px 14px;
        border-radius: 30px;
      }
      .auth-btn {
        background: #3b82f6;
        padding: 8px 22px;
        border-radius: 30px;
        color: #fff;
        font-weight: 600;
        text-decoration: none;
      }
      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #9ca3af;
        cursor: pointer;
      }
      .logout-btn {
        background: 0 0;
        border: 1px solid #3b82f6;
        color: #3b82f6;
        padding: 5px 12px;
        border-radius: 20px;
        cursor: pointer;
      }
      .main {
        padding: 48px 0 64px;
      }
      .page-header {
        text-align: center;
        margin-bottom: 40px;
      }
      .page-header h1 {
        font-size: 2.5rem;
        background: linear-gradient(135deg, #fff, #3b82f6);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
        gap: 24px;
      }
      .product-card {
        background: #15181f;
        border-radius: 20px;
        border: 1px solid #22262e;
        transition: transform 0.2s;
        position: relative;
        display: flex;
        overflow: hidden;
        cursor: pointer;
      }
      .product-card:hover {
        transform: translateY(-4px);
        border-color: #3b82f6;
      }
      .product-image {
        flex: 0 0 200px;
        background: #0f1117;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .product-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .product-image .no-image {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        background: #1f2329;
      }
      .product-details {
        flex: 1;
        padding: 16px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .product-name {
        font-size: 1.3rem;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .product-price {
        font-size: 1.5rem;
        font-weight: bold;
        color: #3b82f6;
        margin-bottom: 12px;
      }
      .btn-buy {
        background: #3b82f6;
        border: none;
        padding: 8px 20px;
        border-radius: 40px;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        align-self: flex-start;
        margin-top: 8px;
      }
      .edit-icon,
      .delete-icon {
        position: absolute;
        background: #0009;
        backdrop-filter: blur(4px);
        border-radius: 20px;
        padding: 4px 10px;
        font-size: 0.8rem;
        cursor: pointer;
        color: #fff;
        z-index: 3;
      }
      .edit-icon {
        top: 12px;
        right: 12px;
      }
      .delete-icon {
        top: 12px;
        right: 70px;
        background: #dc2626cc;
      }
      .delete-icon:hover {
        background: #dc2626;
      }
      .edit-icon:hover {
        background: #3b82f6;
      }
      .admin-controls {
        background: #15181f;
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 30px;
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        align-items: flex-end;
      }
      .admin-controls input,
      .admin-controls textarea {
        background: #1f2329;
        border: 1px solid #2d3138;
        padding: 10px 12px;
        border-radius: 12px;
        color: #fff;
        flex: 1;
      }
      .admin-controls button {
        background: #3b82f6;
        border: none;
        padding: 10px 20px;
        border-radius: 30px;
        color: #fff;
        cursor: pointer;
      }
      .footer {
        background: #0f1117;
        border-top: 1px solid #1f2329;
        padding: 30px 0;
      }
      .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
      }
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000c;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .modal.active {
        display: flex;
      }
      .modal-content {
        background: #15181f;
        border-radius: 24px;
        padding: 24px;
        width: 90%;
        max-width: 500px;
      }
      .modal-content input,
      .modal-content textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 12px;
        background: #1f2329;
        border: 1px solid #2d3138;
        border-radius: 12px;
        color: #fff;
      }
      .modal-content button {
        background: #3b82f6;
        border: 0;
        padding: 8px 16px;
        border-radius: 30px;
        color: #fff;
        cursor: pointer;
        margin-right: 12px;
      }
      @media (max-width: 768px) {
        .navbar {
          flex-direction: column;
          text-align: center;
        }
        .nav-links {
          justify-content: center;
        }
        .products-grid {
          grid-template-columns: 1fr;
        }
        .product-card {
          flex-direction: column;
        }
        .product-image {
          flex: 0 0 200px;
          width: 100%;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="navbar">
          <div class="logo"><a href="index.html">ATBUY</a></div>
          <div class="nav-links">
            <a href="reviews.html">Отзывы</a
            ><a href="cart.html" class="cart-link">🛒 Корзина</a
            ><a href="https://t.me/your_telegram" target="_blank">Telegram</a
            ><a
              href="https://www.youtube.com/@atr1but"
              target="_blank"
              class="youtube-link"
              >🎬 YouTube</a
            >
            <div id="auth-section"></div>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="container">
        <div class="page-header"><h1 id="gameTitle">Загрузка...</h1></div>
        <div id="adminPanel" style="display: none"></div>
        <div id="productsContainer" class="products-grid"></div>
      </div>
    </main>
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div>© 2025 ATBUY. Все права защищены.</div>
          <div>
            <a
              href="reviews.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Отзывы</a
            ><a
              href="terms.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Оферта</a
            ><a
              href="delivery.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Доставка</a
            ><a
              href="requisites.html"
              style="color: #9ca3af; text-decoration: none"
              >Реквизиты</a
            >
          </div>
        </div>
      </div>
    </footer>
    <div id="editModal" class="modal">
      <div class="modal-content">
        <h3>Редактировать товар</h3>
        <input type="text" id="editName" placeholder="Название" /><input
          type="text"
          id="editPrice"
          placeholder="Цена"
        /><input type="file" id="editImageFile" accept="image/*" /><textarea
          id="editDescription"
          rows="4"
          placeholder="Описание товара"
        ></textarea>
        <div style="margin: 8px 0; font-size: 0.75rem; color: #9ca3af">
          Оставьте изображение пустым, чтобы не менять
        </div>
        <div style="display: flex; justify-content: flex-end">
          <button id="saveEditBtn">Сохранить</button
          ><button id="cancelEditBtn" style="background: #4b5563">
            Отмена
          </button>
        </div>
      </div>
    </div>
    <script>
      const SUPABASE_URL = "https://buonqsikukvqbnbpuuco.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );
      let currentUser = null,
        isAdmin = false,
        products = [],
        editingProductId = null,
        currentGameId = null;
      function getGameIdFromUrl() {
        return new URLSearchParams(window.location.search).get("id");
      }
      async function loadGameInfo() {
        const { data, error } = await supabaseClient
          .from("games")
          .select("name")
          .eq("id", currentGameId)
          .single();
        if (error) {
          console.error(error);
          document.getElementById("gameTitle").innerText = "Игра не найдена";
          return;
        }
        document.getElementById("gameTitle").innerText =
          data.name + " — товары и услуги";
      }
      async function uploadProductImage(file, productId) {
        const fileExt = file.name.split(".").pop();
        const fileName = `product_${productId}_${Date.now()}.${fileExt}`;
        const { error } = await supabaseClient.storage
          .from("game_images")
          .upload(fileName, file);
        if (error) throw error;
        const {
          data: { publicUrl },
        } = supabaseClient.storage.from("game_images").getPublicUrl(fileName);
        return publicUrl;
      }
      async function loadProducts() {
        const { data, error } = await supabaseClient
          .from("game_products")
          .select("*")
          .eq("game_id", currentGameId)
          .order("id");
        if (error) {
          console.error(error);
          return;
        }
        products = data || [];
        renderProducts();
      }
      async function saveProduct(product, imageFile = null) {
        let imageUrl = product.image;
        if (imageFile) {
          const tempId = product.id || Date.now();
          imageUrl = await uploadProductImage(imageFile, tempId);
        }
        // Добавляем символ рубля, если его нет
        let priceWithRub = product.price;
        if (priceWithRub && !priceWithRub.includes("₽")) {
          priceWithRub = priceWithRub + " ₽";
        }
        if (product.id) {
          const { error } = await supabaseClient
            .from("game_products")
            .update({
              name: product.name,
              price: priceWithRub,
              image: imageUrl,
              description: product.description,
            })
            .eq("id", product.id);
          if (error) throw error;
        } else {
          const { error } = await supabaseClient.from("game_products").insert({
            game_id: currentGameId,
            name: product.name,
            price: priceWithRub,
            image: imageUrl,
            description: product.description,
          });
          if (error) throw error;
        }
      }
      async function deleteProduct(id) {
        await supabaseClient.from("game_products").delete().eq("id", id);
      }
      function renderProducts() {
        const container = document.getElementById("productsContainer");
        if (!products.length) {
          container.innerHTML =
            '<div style="grid-column:1/-1; text-align:center; padding:40px;">Товары отсутствуют. Добавьте первый товар.</div>';
          return;
        }
        container.innerHTML = products
          .map(
            (prod) => `
                <div class="product-card" data-product-id="${prod.id}">
                    ${isAdmin ? `<div class="edit-icon" data-id="${prod.id}" data-name="${escapeHtml(prod.name)}" data-price="${escapeHtml(prod.price)}" data-image="${escapeHtml(prod.image || "")}" data-description="${escapeHtml(prod.description || "")}">✏️</div><div class="delete-icon" data-id="${prod.id}">🗑️</div>` : ""}
                    <div class="product-image">${prod.image ? `<img src="${prod.image}" alt="${escapeHtml(prod.name)}">` : '<div class="no-image">🖼️</div>'}</div>
                    <div class="product-details">
                        <div class="product-name">${escapeHtml(prod.name)}</div>
                        <div class="product-price">${escapeHtml(prod.price)}</div>
                        <button class="btn-buy" data-id="${prod.id}">Купить</button>
                    </div>
                </div>
            `,
          )
          .join("");
        // Клик по карточке (кроме кнопки и иконок) -> страница товара
        document.querySelectorAll(".product-card").forEach((card) => {
          card.addEventListener("click", (e) => {
            if (
              e.target.classList.contains("btn-buy") ||
              e.target.classList.contains("edit-icon") ||
              e.target.classList.contains("delete-icon")
            )
              return;
            const productId = card.dataset.productId;
            if (productId)
              window.location.href = `product.html?id=${productId}`;
          });
        });
        // Кнопка "Купить" -> добавление в корзину
        document.querySelectorAll(".btn-buy").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const productId = parseInt(btn.dataset.id);
            const product = products.find((p) => p.id === productId);
            if (product) addToCart(product);
          });
        });
        if (isAdmin) {
          document.querySelectorAll(".edit-icon").forEach((icon) =>
            icon.addEventListener("click", (e) => {
              e.stopPropagation();
              openEditModal(
                parseInt(icon.dataset.id),
                icon.dataset.name,
                icon.dataset.price,
                icon.dataset.image,
                icon.dataset.description,
              );
            }),
          );
          document.querySelectorAll(".delete-icon").forEach((icon) =>
            icon.addEventListener("click", async (e) => {
              e.stopPropagation();
              if (confirm("Удалить товар?")) {
                await deleteProduct(parseInt(icon.dataset.id));
                await loadProducts();
              }
            }),
          );
        }
      }
      async function addToCart(product) {
        if (!currentUser) {
          alert("Войдите в аккаунт");
          window.location.href = "login.html";
          return;
        }
        const { data: existing, error: checkError } = await supabaseClient
          .from("cart")
          .select("id, quantity")
          .eq("user_id", currentUser.id)
          .eq("product_id", product.id)
          .maybeSingle();
        if (checkError && checkError.code !== "PGRST116") {
          alert("Ошибка проверки корзины");
          return;
        }
        if (existing) {
          const { error } = await supabaseClient
            .from("cart")
            .update({ quantity: existing.quantity + 1 })
            .eq("id", existing.id);
          if (error) alert("Ошибка обновления");
          else alert("Товар добавлен в корзину!");
        } else {
          const { error } = await supabaseClient.from("cart").insert({
            user_id: currentUser.id,
            game_id: currentGameId,
            product_id: product.id,
            product_name: product.name,
            product_price: product.price,
            quantity: 1,
          });
          if (error) alert("Ошибка добавления");
          else alert("Товар добавлен в корзину!");
        }
      }
      function renderAdminPanel() {
        const container = document.getElementById("adminPanel");
        container.style.display = "block";
        container.innerHTML = `
                <div class="admin-controls">
                    <input type="text" id="newProductName" placeholder="Название товара">
                    <input type="text" id="newProductPrice" placeholder="Цена (например, 1000)">
                    <input type="file" id="newProductImage" accept="image/*">
                    <textarea id="newProductDescription" rows="2" placeholder="Описание товара"></textarea>
                    <button id="addProductBtn">➕ Добавить товар</button>
                </div>
            `;
        document
          .getElementById("addProductBtn")
          .addEventListener("click", async () => {
            const name = document.getElementById("newProductName").value.trim();
            let price = document.getElementById("newProductPrice").value.trim();
            const imageFile =
              document.getElementById("newProductImage").files[0];
            const description = document
              .getElementById("newProductDescription")
              .value.trim();
            if (!name || !price) {
              alert("Заполните название и цену");
              return;
            }
            if (price && !price.includes("₽")) price = price + " ₽";
            try {
              const tempId = Date.now();
              let imageUrl = null;
              if (imageFile)
                imageUrl = await uploadProductImage(imageFile, tempId);
              await saveProduct(
                { name, price, image: imageUrl, description },
                null,
              );
              await loadProducts();
              document.getElementById("newProductName").value = "";
              document.getElementById("newProductPrice").value = "";
              document.getElementById("newProductImage").value = "";
              document.getElementById("newProductDescription").value = "";
            } catch (err) {
              alert("Ошибка добавления: " + err.message);
            }
          });
      }
      function openEditModal(id, name, price, imageUrl, description) {
        editingProductId = id;
        document.getElementById("editName").value = name;
        document.getElementById("editPrice").value = price.replace(" ₽", "");
        document.getElementById("editImageFile").value = "";
        document.getElementById("editDescription").value = description || "";
        document.getElementById("editModal").classList.add("active");
      }
      async function saveEdit() {
        const newName = document.getElementById("editName").value.trim();
        let newPrice = document.getElementById("editPrice").value.trim();
        const imageFile = document.getElementById("editImageFile").files[0];
        const newDescription = document
          .getElementById("editDescription")
          .value.trim();
        if (!newName || !newPrice) {
          alert("Заполните название и цену");
          return;
        }
        if (newPrice && !newPrice.includes("₽")) newPrice = newPrice + " ₽";
        try {
          let imageUrl = null;
          if (imageFile)
            imageUrl = await uploadProductImage(imageFile, editingProductId);
          await saveProduct(
            {
              id: editingProductId,
              name: newName,
              price: newPrice,
              image: imageUrl,
              description: newDescription,
            },
            null,
          );
          await loadProducts();
          document.getElementById("editModal").classList.remove("active");
        } catch (err) {
          alert("Ошибка обновления: " + err.message);
        }
      }
      async function checkAuth() {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();
        if (session) {
          currentUser = session.user;
          const { data: userData } = await supabaseClient
            .from("users")
            .select("is_admin")
            .eq("id", currentUser.id)
            .single();
          isAdmin =
            userData?.is_admin || currentUser.email === "vufysay@gmail.com";
          document.getElementById("auth-section").innerHTML =
            `<div class="user-info" id="userMenu"><span>👤 ${escapeHtml(currentUser.user_metadata.name || currentUser.email)}</span><button id="logoutBtn" class="logout-btn">Выйти</button></div>`;
          document.getElementById("userMenu").addEventListener("click", (e) => {
            if (e.target.id !== "logoutBtn")
              window.location.href = "profile.html";
          });
          document
            .getElementById("logoutBtn")
            .addEventListener("click", async (e) => {
              e.stopPropagation();
              await supabaseClient.auth.signOut();
              window.location.reload();
            });
          if (isAdmin) renderAdminPanel();
        } else {
          document.getElementById("auth-section").innerHTML =
            `<a href="login.html" class="auth-btn">Вход / Регистрация</a>`;
          isAdmin = false;
        }
        await loadProducts();
      }
      function escapeHtml(str) {
        return str.replace(
          /[&<>]/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m],
        );
      }
      window.addEventListener("load", async () => {
        currentGameId = getGameIdFromUrl();
        if (!currentGameId) {
          document.getElementById("gameTitle").innerText = "Игра не указана";
          return;
        }
        await loadGameInfo();
        await checkAuth();
        document
          .getElementById("saveEditBtn")
          .addEventListener("click", saveEdit);
        document
          .getElementById("cancelEditBtn")
          .addEventListener("click", () =>
            document.getElementById("editModal").classList.remove("active"),
          );
      });
    </script>
  </body>
</html>
