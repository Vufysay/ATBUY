<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATBUY — Товары игры</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0a0c10;
        color: #eef2ff;
      }
      .header {
        background: #0f1117;
        border-bottom: 1px solid #1f2329;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 0 24px;
      }
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
        flex-wrap: wrap;
        gap: 16px;
      }
      .logo a {
        font-size: 1.8rem;
        font-weight: 800;
        text-decoration: none;
        color: #3b82f6;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 28px;
        flex-wrap: wrap;
      }
      .nav-links a {
        text-decoration: none;
        color: #9ca3af;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: #3b82f6;
      }
      .cart-link {
        background: #3b82f6;
        padding: 6px 14px;
        border-radius: 30px;
        color: #fff !important;
      }
      .youtube-link {
        background: #ff0000;
        color: #fff !important;
        padding: 6px 14px;
        border-radius: 30px;
      }
      .auth-btn {
        background: #3b82f6;
        padding: 8px 22px;
        border-radius: 30px;
        color: #fff;
        font-weight: 600;
        text-decoration: none;
      }
      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #9ca3af;
        cursor: pointer;
      }
      .logout-btn {
        background: 0 0;
        border: 1px solid #3b82f6;
        color: #3b82f6;
        padding: 5px 12px;
        border-radius: 20px;
        cursor: pointer;
      }
      .main {
        padding: 48px 0 64px;
      }
      .page-header {
        text-align: center;
        margin-bottom: 40px;
      }
      .page-header h1 {
        font-size: 2.5rem;
        background: linear-gradient(135deg, #fff, #3b82f6);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
        gap: 24px;
      }
      .product-card {
        background: #15181f;
        border-radius: 20px;
        border: 1px solid #22262e;
        transition: transform 0.2s;
        position: relative;
        display: flex;
        overflow: hidden;
        cursor: pointer;
      }
      .product-card:hover {
        transform: translateY(-4px);
        border-color: #3b82f6;
      }
      .product-image {
        flex: 0 0 200px;
        background: #0f1117;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .product-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .product-image .no-image {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        background: #1f2329;
      }
      .product-details {
        flex: 1;
        padding: 16px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .product-name {
        font-size: 1.3rem;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .product-price {
        font-size: 1.5rem;
        font-weight: bold;
        color: #3b82f6;
        margin-bottom: 12px;
      }
      .btn-buy {
        background: #3b82f6;
        border: none;
        padding: 8px 20px;
        border-radius: 40px;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        align-self: flex-start;
        margin-top: 8px;
      }
      .footer {
        background: #0f1117;
        border-top: 1px solid #1f2329;
        padding: 30px 0;
      }
      .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
      }
      @media (max-width: 768px) {
        .navbar {
          flex-direction: column;
          text-align: center;
        }
        .products-grid {
          grid-template-columns: 1fr;
        }
        .product-card {
          flex-direction: column;
        }
        .product-image {
          flex: 0 0 200px;
          width: 100%;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="navbar">
          <div class="logo"><a href="index.html">ATBUY</a></div>
          <div class="nav-links">
            <a href="reviews.html">Отзывы</a>
            <a href="cart.html" class="cart-link">🛒 Корзина</a>
            <a href="my-orders.html" class="cart-link">📦 Мои заказы</a>
            <a href="support.html" class="cart-link">💬 Поддержка</a>
            <span id="admin-links"></span>
            <a href="https://t.me/your_telegram" target="_blank">Telegram</a>
            <a
              href="https://www.youtube.com/@atr1but"
              target="_blank"
              class="youtube-link"
              >🎬 YouTube</a
            >
            <div id="auth-section"></div>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="container">
        <div class="page-header"><h1 id="gameTitle">Загрузка...</h1></div>
        <div id="productsContainer" class="products-grid"></div>
      </div>
    </main>
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div>© 2025 ATBUY. Все права защищены.</div>
          <div>
            <a
              href="reviews.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Отзывы</a
            >
            <a
              href="terms.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Оферта</a
            >
            <a
              href="delivery.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Доставка</a
            >
            <a
              href="requisites.html"
              style="color: #9ca3af; text-decoration: none"
              >Реквизиты</a
            >
          </div>
        </div>
      </div>
    </footer>

    <script>
      // ---------- АВТОРИЗАЦИЯ ЧЕРЕЗ localStorage ----------
      let currentUser = null;
      let isAdmin = false;
      function checkAuth() {
        const stored = localStorage.getItem("atbuy_current_user");
        if (stored) {
          const userData = JSON.parse(stored);
          currentUser = {
            email: userData.email,
            user_metadata: { name: userData.name },
          };
          isAdmin = localStorage.getItem("atbuy_is_admin") === "true";
        }
        renderAuthHeader();
      }
      function renderAuthHeader() {
        const authSection = document.getElementById("auth-section");
        const adminLinks = document.getElementById("admin-links");
        if (currentUser) {
          authSection.innerHTML = `<div class="user-info" id="userMenu"><span>👤 ${escapeHtml(currentUser.user_metadata?.name || currentUser.email)}</span><button id="logoutBtn" class="logout-btn">Выйти</button></div>`;
          document.getElementById("userMenu").addEventListener("click", (e) => {
            if (e.target.id !== "logoutBtn")
              window.location.href = "profile.html";
          });
          document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("atbuy_current_user");
            localStorage.removeItem("atbuy_is_admin");
            const supabaseClient = window.supabase.createClient(
              "https://buonqsikukvqbnbpuuco.supabase.co",
              "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw",
            );
            supabaseClient.auth
              .signOut()
              .finally(() => window.location.reload());
          });
          if (adminLinks)
            adminLinks.innerHTML = isAdmin
              ? `<a href="admin-chats.html" class="cart-link">📋 Чаты поддержки</a>`
              : "";
        } else {
          authSection.innerHTML = `<a href="login.html" class="auth-btn">Вход / Регистрация</a>`;
          if (adminLinks) adminLinks.innerHTML = "";
        }
      }
      function escapeHtml(str) {
        return str.replace(
          /[&<>]/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m],
        );
      }

      // ---------- ДАННЫЕ ИГРЫ И ТОВАРОВ ----------
      let products = [];
      let currentGameId = new URLSearchParams(window.location.search).get("id");
      if (!currentGameId) {
        document.getElementById("gameTitle").innerText = "Игра не указана";
      }

      async function loadGameInfo() {
        try {
          const response = await fetch("/games.json");
          const games = await response.json();
          const game = games.find((g) => g.id == currentGameId);
          document.getElementById("gameTitle").innerText = game
            ? game.name + " — товары и услуги"
            : "Игра не найдена";
        } catch (err) {
          document.getElementById("gameTitle").innerText = "Ошибка загрузки";
        }
      }

      async function loadProducts() {
        try {
          const response = await fetch("/products.json");
          if (!response.ok) throw new Error("Ошибка загрузки данных");
          const allProducts = await response.json();
          products = allProducts.filter((p) => p.game_id == currentGameId);
          renderProducts();
        } catch (err) {
          console.error(err);
          document.getElementById("productsContainer").innerHTML =
            "<div>Ошибка загрузки товаров</div>";
        }
      }

      function renderProducts() {
        const container = document.getElementById("productsContainer");
        if (!products.length) {
          container.innerHTML =
            '<div style="text-align:center; padding:40px;">Товары отсутствуют.</div>';
          return;
        }
        container.innerHTML = products
          .map(
            (prod) => `
          <div class="product-card" data-product-id="${prod.id}">
            <div class="product-image">${prod.image ? `<img src="${prod.image}" alt="${escapeHtml(prod.name)}">` : '<div class="no-image">🖼️</div>'}</div>
            <div class="product-details">
              <div class="product-name">${escapeHtml(prod.name)}</div>
              <div class="product-price">${escapeHtml(prod.price)}</div>
              <button class="btn-buy" data-id="${prod.id}">Купить</button>
            </div>
          </div>
        `,
          )
          .join("");

        document.querySelectorAll(".btn-buy").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const productId = parseInt(btn.dataset.id);
            addToCart(productId);
          });
        });
        document.querySelectorAll(".product-card").forEach((card) => {
          card.addEventListener("click", () => {
            const productId = card.dataset.productId;
            if (productId)
              window.location.href = `product.html?id=${productId}`;
          });
        });
      }

      async function addToCart(productId) {
        if (!currentUser) {
          alert("Войдите в аккаунт");
          window.location.href = "login.html";
          return;
        }
        const product = products.find((p) => p.id == productId);
        if (!product) return;

        const supabaseClient = window.supabase.createClient(
          "https://buonqsikukvqbnbpuuco.supabase.co",
          "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw",
        );

        const { data: existing, error: checkError } = await supabaseClient
          .from("cart")
          .select("id, quantity")
          .eq("user_id", currentUser.email) // временно: используем email вместо id, т.к. нет полного профиля
          .eq("product_id", productId)
          .maybeSingle();

        // Т.к. у нас нет ID пользователя в localStorage, лучше сохранять cart в localStorage или запрашивать ID из Supabase.
        // Упрощённый вариант: сохраняем cart прямо в localStorage.
        let cart = JSON.parse(localStorage.getItem("cart") || "[]");
        const existingItem = cart.find((item) => item.product_id === productId);
        if (existingItem) {
          existingItem.quantity += 1;
        } else {
          cart.push({
            product_id: productId,
            product_name: product.name,
            product_price: product.price,
            quantity: 1,
            options: [],
          });
        }
        localStorage.setItem("cart", JSON.stringify(cart));
        alert("Товар добавлен в корзину!");
      }

      // ---------- ЗАПУСК ----------
      window.addEventListener("load", () => {
        checkAuth();
        loadGameInfo();
        loadProducts();
      });
    </script>
  </body>
</html>
