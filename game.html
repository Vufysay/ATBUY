<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATBUY — Товары игры</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0a0c10;
        color: #eef2ff;
      }
      .header {
        background: #0f1117;
        border-bottom: 1px solid #1f2329;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 0 24px;
      }
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
        flex-wrap: wrap;
        gap: 16px;
      }
      .logo a {
        font-size: 1.8rem;
        font-weight: 800;
        text-decoration: none;
        color: #3b82f6;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 28px;
        flex-wrap: wrap;
      }
      .nav-links a {
        text-decoration: none;
        color: #9ca3af;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: #3b82f6;
      }
      .cart-link {
        background: #3b82f6;
        padding: 6px 14px;
        border-radius: 30px;
        color: #fff !important;
      }
      .youtube-link {
        background: #ff0000;
        color: #fff !important;
        padding: 6px 14px;
        border-radius: 30px;
      }
      .auth-btn {
        background: #3b82f6;
        padding: 8px 22px;
        border-radius: 30px;
        color: #fff;
        font-weight: 600;
        text-decoration: none;
      }
      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #9ca3af;
        cursor: pointer;
      }
      .logout-btn {
        background: 0 0;
        border: 1px solid #3b82f6;
        color: #3b82f6;
        padding: 5px 12px;
        border-radius: 20px;
        cursor: pointer;
      }
      .main {
        padding: 48px 0 64px;
      }
      .page-header {
        text-align: center;
        margin-bottom: 40px;
      }
      .page-header h1 {
        font-size: 2.5rem;
        background: linear-gradient(135deg, #fff, #3b82f6);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 28px;
        margin-bottom: 40px;
      }
      .product-card {
        background: #15181f;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid #22262e;
        transition: transform 0.2s;
        position: relative;
        padding: 20px;
        text-align: center;
      }
      .product-card:hover {
        transform: translateY(-6px);
        border-color: #3b82f6;
      }
      .product-name {
        font-size: 1.3rem;
        font-weight: 700;
        margin-bottom: 12px;
      }
      .product-price {
        font-size: 1.5rem;
        font-weight: bold;
        color: #3b82f6;
        margin-bottom: 16px;
      }
      .btn-buy {
        background: #3b82f6;
        border: none;
        padding: 10px 24px;
        border-radius: 40px;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
      }
      .edit-icon,
      .delete-icon {
        position: absolute;
        background: #0009;
        backdrop-filter: blur(4px);
        border-radius: 20px;
        padding: 4px 10px;
        font-size: 0.8rem;
        cursor: pointer;
        color: #fff;
        z-index: 2;
      }
      .edit-icon {
        top: 12px;
        right: 12px;
      }
      .delete-icon {
        top: 12px;
        right: 70px;
        background: #dc2626cc;
      }
      .delete-icon:hover {
        background: #dc2626;
      }
      .edit-icon:hover {
        background: #3b82f6;
      }
      .admin-controls {
        background: #15181f;
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 30px;
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        align-items: flex-end;
      }
      .admin-controls input {
        background: #1f2329;
        border: 1px solid #2d3138;
        padding: 10px 12px;
        border-radius: 12px;
        color: #fff;
        flex: 1;
      }
      .admin-controls button {
        background: #3b82f6;
        border: none;
        padding: 10px 20px;
        border-radius: 30px;
        color: #fff;
        cursor: pointer;
      }
      .footer {
        background: #0f1117;
        border-top: 1px solid #1f2329;
        padding: 30px 0;
      }
      .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
      }
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000c;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .modal.active {
        display: flex;
      }
      .modal-content {
        background: #15181f;
        border-radius: 24px;
        padding: 24px;
        width: 90%;
        max-width: 400px;
      }
      .modal-content input {
        width: 100%;
        padding: 10px;
        margin-bottom: 12px;
        background: #1f2329;
        border: 1px solid #2d3138;
        border-radius: 12px;
        color: #fff;
      }
      .modal-content button {
        background: #3b82f6;
        border: 0;
        padding: 8px 16px;
        border-radius: 30px;
        color: #fff;
        cursor: pointer;
        margin-right: 12px;
      }
      @media (max-width: 768px) {
        .navbar {
          flex-direction: column;
          text-align: center;
        }
        .nav-links {
          justify-content: center;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="navbar">
          <div class="logo"><a href="index.html">ATBUY</a></div>
          <div class="nav-links">
            <a href="reviews.html">Отзывы</a
            ><a href="cart.html" class="cart-link">🛒 Корзина</a
            ><a href="https://t.me/your_telegram" target="_blank">Telegram</a
            ><a
              href="https://www.youtube.com/@atr1but"
              target="_blank"
              class="youtube-link"
              >🎬 YouTube</a
            >
            <div id="auth-section"></div>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="container">
        <div class="page-header"><h1 id="gameTitle">Загрузка...</h1></div>
        <div id="adminPanel" style="display: none"></div>
        <div id="productsContainer" class="products-grid">
          Загрузка товаров...
        </div>
      </div>
    </main>
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div>© 2025 ATBUY. Все права защищены.</div>
          <div>
            <a
              href="reviews.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Отзывы</a
            ><a
              href="terms.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Оферта</a
            ><a
              href="delivery.html"
              style="color: #9ca3af; text-decoration: none; margin-right: 20px"
              >Доставка</a
            ><a
              href="requisites.html"
              style="color: #9ca3af; text-decoration: none"
              >Реквизиты</a
            >
          </div>
        </div>
      </div>
    </footer>
    <div id="editModal" class="modal">
      <div class="modal-content">
        <h3>Редактировать товар</h3>
        <input type="text" id="editName" placeholder="Название" /><input
          type="text"
          id="editPrice"
          placeholder="Цена"
        />
        <div style="display: flex; justify-content: flex-end">
          <button id="saveEditBtn">Сохранить</button
          ><button id="cancelEditBtn" style="background: #4b5563">
            Отмена
          </button>
        </div>
      </div>
    </div>
    <script>
      const SUPABASE_URL = "https://buonqsikukvqbnbpuuco.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b25xc2lrdWt2cWJuYnB1dWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTU0MzQsImV4cCI6MjA5MDYzMTQzNH0.cCN9ciGSblGTYHUXeyQ_1Yr4htM__7F1CfHkcgQGmcw";
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );
      let currentUser = null,
        isAdmin = false,
        products = [],
        editingProductId = null,
        currentGameId = null;
      function getGameIdFromUrl() {
        return new URLSearchParams(window.location.search).get("id");
      }
      async function loadGameInfo() {
        const { data, error } = await supabaseClient
          .from("games")
          .select("name")
          .eq("id", currentGameId)
          .single();
        if (error) {
          console.error("Ошибка загрузки игры:", error);
          document.getElementById("gameTitle").innerText = "Игра не найдена";
          return;
        }
        document.getElementById("gameTitle").innerText =
          data.name + " — товары и услуги";
      }
      async function loadProducts() {
        console.log("Загрузка товаров для game_id:", currentGameId);
        const { data, error } = await supabaseClient
          .from("game_products")
          .select("*")
          .eq("game_id", currentGameId)
          .order("id");
        if (error) {
          console.error("Ошибка загрузки товаров:", error);
          return;
        }
        products = data || [];
        console.log("Товары:", products);
        renderProducts();
      }
      async function addToCart(product) {
        if (!currentUser) {
          alert("Войдите в аккаунт");
          window.location.href = "login.html";
          return;
        }
        const { data: existing, error: checkError } = await supabaseClient
          .from("cart")
          .select("id, quantity")
          .eq("user_id", currentUser.id)
          .eq("product_id", product.id)
          .maybeSingle();
        if (checkError && checkError.code !== "PGRST116") {
          alert("Ошибка проверки корзины: " + checkError.message);
          return;
        }
        if (existing) {
          const { error: updateError } = await supabaseClient
            .from("cart")
            .update({ quantity: existing.quantity + 1 })
            .eq("id", existing.id);
          if (updateError) alert("Ошибка обновления: " + updateError.message);
          else alert("Товар добавлен в корзину!");
        } else {
          const { error: insertError } = await supabaseClient
            .from("cart")
            .insert({
              user_id: currentUser.id,
              game_id: currentGameId,
              product_id: product.id,
              product_name: product.name,
              product_price: product.price,
              quantity: 1,
            });
          if (insertError) alert("Ошибка добавления: " + insertError.message);
          else alert("Товар добавлен в корзину!");
        }
      }
      async function saveProduct(product) {
        if (product.id)
          await supabaseClient
            .from("game_products")
            .update({ name: product.name, price: product.price })
            .eq("id", product.id);
        else
          await supabaseClient.from("game_products").insert({
            game_id: currentGameId,
            name: product.name,
            price: product.price,
          });
      }
      async function deleteProduct(id) {
        await supabaseClient.from("game_products").delete().eq("id", id);
      }
      function renderProducts() {
        const container = document.getElementById("productsContainer");
        if (!products.length) {
          container.innerHTML =
            '<div style="grid-column:1/-1; text-align:center; padding:40px;">Товары отсутствуют. Добавьте первый товар.</div>';
          return;
        }
        container.innerHTML = products
          .map(
            (prod) => `
                <div class="product-card">
                    ${isAdmin ? `<div class="edit-icon" data-id="${prod.id}" data-name="${escapeHtml(prod.name)}" data-price="${escapeHtml(prod.price)}">✏️</div><div class="delete-icon" data-id="${prod.id}">🗑️</div>` : ""}
                    <div class="product-name">${escapeHtml(prod.name)}</div>
                    <div class="product-price">${escapeHtml(prod.price)}</div>
                    <button class="btn-buy" data-id="${prod.id}">Купить</button>
                </div>
            `,
          )
          .join("");
        document.querySelectorAll(".btn-buy").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const productId = parseInt(btn.dataset.id);
            const product = products.find((p) => p.id === productId);
            if (product) await addToCart(product);
          });
        });
        if (isAdmin) {
          document.querySelectorAll(".edit-icon").forEach((icon) =>
            icon.addEventListener("click", (e) => {
              e.stopPropagation();
              openEditModal(
                parseInt(icon.dataset.id),
                icon.dataset.name,
                icon.dataset.price,
              );
            }),
          );
          document.querySelectorAll(".delete-icon").forEach((icon) =>
            icon.addEventListener("click", async (e) => {
              e.stopPropagation();
              if (confirm("Удалить товар?")) {
                await deleteProduct(parseInt(icon.dataset.id));
                await loadProducts();
              }
            }),
          );
        }
      }
      function renderAdminPanel() {
        const container = document.getElementById("adminPanel");
        container.style.display = "block";
        container.innerHTML = `
        <div class="admin-controls">
            <input type="text" id="newProductName" placeholder="Название товара">
            <input type="text" id="newProductPrice" placeholder="Цена (например, 1000 ₽)">
            <button id="addProductBtn">➕ Добавить товар</button>
        </div>
    `;
        document
          .getElementById("addProductBtn")
          .addEventListener("click", async () => {
            const name = document.getElementById("newProductName").value.trim();
            const price = document
              .getElementById("newProductPrice")
              .value.trim();
            if (!name || !price) {
              alert("Заполните поля");
              return;
            }
            try {
              await saveProduct({ name, price });
              await loadProducts();
              document.getElementById("newProductName").value = "";
              document.getElementById("newProductPrice").value = "";
            } catch (err) {
              alert("Ошибка добавления: " + err.message);
            }
          });
      }
      async function checkAuth() {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();
        if (session) {
          currentUser = session.user;
          const { data: userData } = await supabaseClient
            .from("users")
            .select("is_admin")
            .eq("id", currentUser.id)
            .single();
          isAdmin =
            userData?.is_admin || currentUser.email === "vufysay@gmail.com";
          document.getElementById("auth-section").innerHTML =
            `<div class="user-info" id="userMenu"><span>👤 ${escapeHtml(currentUser.user_metadata.name || currentUser.email)}</span><button id="logoutBtn" class="logout-btn">Выйти</button></div>`;
          document.getElementById("userMenu").addEventListener("click", (e) => {
            if (e.target.id !== "logoutBtn")
              window.location.href = "profile.html";
          });
          document
            .getElementById("logoutBtn")
            .addEventListener("click", async (e) => {
              e.stopPropagation();
              await supabaseClient.auth.signOut();
              window.location.reload();
            });
          if (isAdmin) renderAdminPanel();
        } else {
          document.getElementById("auth-section").innerHTML =
            `<a href="login.html" class="auth-btn">Вход / Регистрация</a>`;
          isAdmin = false;
        }
        await loadProducts();
      }
      function escapeHtml(str) {
        return str.replace(
          /[&<>]/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m],
        );
      }
      window.addEventListener("load", async () => {
        currentGameId = getGameIdFromUrl();
        if (!currentGameId) {
          document.getElementById("gameTitle").innerText = "Игра не указана";
          return;
        }
        await loadGameInfo();
        await checkAuth();
        document
          .getElementById("saveEditBtn")
          .addEventListener("click", saveEdit);
        document
          .getElementById("cancelEditBtn")
          .addEventListener("click", () =>
            document.getElementById("editModal").classList.remove("active"),
          );
      });
    </script>
  </body>
</html>
